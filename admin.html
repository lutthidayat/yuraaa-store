<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa HUD</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:white}

/* LOGIN */
#loginPage{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:#020617;z-index:9999;
}
.login-box{
background:#0f172a;padding:25px;border-radius:16px;width:90%;max-width:300px;text-align:center;
}

/* BALANCE */
.balance{
text-align:center;font-size:30px;color:#22c55e;margin:15px;
text-shadow:0 0 15px #22c55e;
}

/* CARD */
.card{
margin:12px;padding:15px;border-radius:16px;
background:rgba(255,255,255,0.05);
}

/* BUTTON */
button{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:10px;
background:#22c55e;color:black;font-weight:bold;
}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#020617;padding:10px;
}
.nav div{opacity:0.5}
.nav .active{opacity:1;color:#22c55e}

/* TARGET LIST */
.target-item{
background:#0f172a;padding:10px;border-radius:10px;margin-top:8px;
display:flex;justify-content:space-between;
}

/* HUD */
.progress{
width:180px;height:180px;border-radius:50%;
margin:20px auto;
display:flex;align-items:center;justify-content:center;
font-size:20px;
background:conic-gradient(#22c55e 0%,#1e293b 0%);
box-shadow:0 0 25px #22c55e;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 ADMIN</h2>
<input id="passwordInput" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>
</div>

<!-- BALANCE -->
<div class="balance" id="balance">Rp0</div>

<!-- TARGET LIST -->
<div id="targetList" class="tab active">
<div class="card">
<h3>🎯 Tabungan</h3>

<div id="targets"></div>

<button onclick="addTarget()">+ Tambah Tabungan</button>
</div>
</div>

<!-- DETAIL -->
<div id="targetDetail" class="tab">

<div class="card" style="text-align:center">
<h3 id="tName">Nama</h3>

<div class="progress" id="circle">Rp0</div>

<p id="tInfo"></p>

<button onclick="addMoney()">+ Tambah Uang</button>
<button onclick="back()">Kembali</button>

</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="showTab('targetList',this)">🎯</div>
</div>

<script>

// LOGIN
function login(){
if(passwordInput.value==="123"){
loginPage.style.display="none";
}else alert("Salah");
}

// DATA
let targets=JSON.parse(localStorage.getItem("targets"))||[];
let currentIndex=null;

// FORMAT
function rp(x){return "Rp"+(x||0).toLocaleString("id-ID");}

// RENDER LIST
function renderTargets(){
targetsDiv.innerHTML="";
targets.forEach((t,i)=>{
let el=document.createElement("div");
el.className="target-item";
el.innerHTML=
"<div>"+t.name+"</div>"+
"<div>"+rp(t.current)+"</div>";
el.onclick=()=>openDetail(i);
targetsDiv.appendChild(el);
});
localStorage.setItem("targets",JSON.stringify(targets));
}

// ADD TARGET
function addTarget(){
let name=prompt("Nama tabungan:");
let target=prompt("Target uang:");
if(!name||!target)return;

targets.push({
name:name,
target:parseInt(target),
current:0
});

renderTargets();
}

// DETAIL
function openDetail(i){
currentIndex=i;
let t=targets[i];

tName.innerText=t.name;

updateDetail();

targetList.classList.remove("active");
targetDetail.classList.add("active");
}

// UPDATE DETAIL
function updateDetail(){
let t=targets[currentIndex];

let percent=Math.min((t.current/t.target)*100,100);

circle.innerText=rp(t.current);
circle.style.background="conic-gradient(#22c55e "+percent+"%,#1e293b 0%)";

tInfo.innerText="Target: "+rp(t.target)+" ("+Math.floor(percent)+"%)";

renderBalance();
}

// ADD MONEY
function addMoney(){
let val=prompt("Tambah uang:");
if(!val)return;

targets[currentIndex].current+=parseInt(val);
updateDetail();
renderTargets();
}

// BACK
function back(){
targetDetail.classList.remove("active");
targetList.classList.add("active");
}

// BALANCE
function renderBalance(){
let total=targets.reduce((a,b)=>a+b.current,0);
balance.innerText=rp(total);
}

// INIT
renderTargets();
renderBalance();

</script>

</body>
</html>
