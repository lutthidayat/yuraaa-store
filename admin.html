<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#020617;color:white}

/* LOGIN */
#loginPage{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#020617;display:flex;align-items:center;justify-content:center;z-index:9999;
}
.login-box{background:#0f172a;padding:25px;border-radius:16px;width:90%;max-width:300px;text-align:center}

/* CARD */
.card{margin:12px;padding:16px;border-radius:16px;background:rgba(255,255,255,0.05)}
.balance{font-size:26px;color:#22c55e;font-weight:bold}

/* LIST */
.item{display:flex;justify-content:space-between;padding:10px;margin-top:8px;background:rgba(255,255,255,0.05);border-radius:10px}

/* INPUT */
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none}
button{background:#22c55e;color:white}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#020617;padding:10px;border-top:1px solid rgba(255,255,255,0.1)
}
.nav div{opacity:0.5}
.nav .active{opacity:1;color:#22c55e}

/* PROGRESS */
.progress{
width:150px;height:150px;border-radius:50%;
margin:auto;display:flex;align-items:center;justify-content:center;
background:conic-gradient(#22c55e 0%,#1e293b 0%)
}

/* FILTER */
.filter{
display:flex;gap:8px;margin-top:10px
}
.filter button{
flex:1;
background:#1e293b
}
.filter .active{background:#22c55e}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 Admin</h2>
<input id="passwordInput" type="password" placeholder="Password">
<button onclick="checkLogin()">Masuk</button>
<p id="errorText" style="color:red;display:none">Password salah</p>
</div>
</div>

<!-- BALANCE -->
<div class="card">
<div class="balance" id="balance">Rp0</div>
</div>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card">
<h3>Riwayat</h3>

<div class="filter">
<button onclick="setFilter('all',this)" class="active">Semua</button>
<button onclick="setFilter('income',this)">Masuk</button>
<button onclick="setFilter('expense',this)">Keluar</button>
</div>

<div id="list"></div>

</div>
</div>

<!-- TARGET -->
<div id="targetTab" class="tab">
<div class="card" style="text-align:center">
<h3>🎯 Target</h3>
<input id="target" placeholder="Target">
<div class="progress" id="progress">0%</div>
</div>
</div>

<!-- FORM -->
<div class="card">

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" type="number" placeholder="Nominal">

<button onclick="addData()">Simpan</button>

</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="switchTab('home',this)">🏠</div>
<div onclick="switchTab('listTab',this)">📋</div>
<div onclick="switchTab('targetTab',this)">🎯</div>
</div>

<script>

// LOGIN
function checkLogin(){
let pass=document.getElementById("passwordInput").value;
if(pass==="123"){
document.getElementById("loginPage").style.display="none";
}else{
errorText.style.display="block";
setTimeout(()=>window.location.href="index.html",1500);
}
}

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[];
let targetVal=localStorage.getItem("target")||0;
let filter="all";

const list=document.getElementById("list");
const balance=document.getElementById("balance");
const progress=document.getElementById("progress");
const targetInput=document.getElementById("target");
const chartCanvas=document.getElementById("chart");

targetInput.value=targetVal;

// TAB
function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

// FILTER
function setFilter(f,el){
filter=f;
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

// FORMAT
function rp(x){return "Rp"+(x||0).toLocaleString("id-ID");}

// RENDER
function render(){
list.innerHTML="";
let income=0,expense=0;

data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

if(filter==="all" || filter===d.type){
let el=document.createElement("div");
el.className="item";
el.innerHTML=
"<div>"+d.desc+"</div>"
+"<div style='color:"+(d.type=="income"?"#22c55e":"#ef4444")+"'>"
+(d.type=="income"?"+":"-")+" "+rp(d.amount)+"</div>";
list.appendChild(el);
}
});

let total=income-expense;
balance.innerText=rp(total);

// chart
if(window.chart) chart.destroy();
window.chart=new Chart(chartCanvas,{
type:"bar",
data:{
labels:["Pemasukan","Pengeluaran"],
datasets:[{data:[income,expense]}]
}
});

// progress
let t=parseInt(targetInput.value)||0;
let p=t?Math.min((total/t)*100,100):0;

progress.innerText=Math.floor(p)+"%";
progress.style.background="conic-gradient(#22c55e "+p+"%,#1e293b 0%)";

localStorage.setItem("data",JSON.stringify(data));
localStorage.setItem("target",t);
}

// ADD
function addData(){
let d={
type:type.value,
desc:desc.value,
amount:parseInt(amount.value)
};

if(!d.desc||!d.amount)return alert("Isi dulu!");

data.push(d);
desc.value="";
amount.value="";
render();
}

// AUTO
targetInput.addEventListener("input",render);

render();

</script>

</body>
</html>
