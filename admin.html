<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:white}

/* HEADER */
.header{padding:20px}
.header small{color:#94a3b8}

/* BALANCE */
.balance{
 margin:10px;
 padding:20px;
 border-radius:20px;
 background:linear-gradient(135deg,#22c55e,#4ade80);
 color:black;
 font-size:26px;
}

/* CARD */
.card{
 margin:10px;
 padding:12px;
 border-radius:14px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
}

/* INPUT */
input,select{
 width:100%;padding:10px;margin-top:6px;
 border:none;border-radius:10px;
 background:#020617;color:white;
}

/* BUTTON */
button{
 width:100%;padding:10px;margin-top:8px;
 border:none;border-radius:10px;
 font-weight:bold;
}
.primary{background:#22c55e;color:black}

/* LIST */
.item{
 display:flex;justify-content:space-between;
 padding:10px;margin-top:6px;
 background:#0f172a;border-radius:10px;
}
.item small{color:#94a3b8}

/* NAV */
.nav{
 position:fixed;bottom:10px;left:50%;
 transform:translateX(-50%);
 width:95%;display:flex;justify-content:space-around;
 background:#0f172a;padding:10px;border-radius:20px;
}
.nav div{opacity:0.5;font-size:12px}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* KPI */
.grid{
 display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
}
.kpi{
 padding:12px;border-radius:12px;
 background:rgba(255,255,255,0.05);
}
.kpi p{font-size:12px;color:#94a3b8}
</style>
</head>

<body>

<div class="header">
<h2>Yuraaa Finance</h2>
<small>Auto Business Dashboard</small>
</div>

<div class="balance" id="balance">Rp 0</div>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">

<select id="type">
<option value="income">+ Pemasukan</option>
<option value="expense">- Pengeluaran</option>
</select>

<select id="category">
<option>Jual Akun</option>
<option>Makanan</option>
<option>Top Up</option>
<option>Lainnya</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp 0">

<button class="primary" onclick="addData()">Simpan</button>

</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card"><div id="list"></div></div>
</div>

<!-- ANALYTICS -->
<div id="analyticsTab" class="tab">
<div class="card"><canvas id="pie"></canvas></div>
<div class="card"><canvas id="bar"></canvas></div>
<div class="card"><canvas id="line"></canvas></div>
</div>

<!-- BUSINESS -->
<div id="businessTab" class="tab">

<div class="grid">
<div class="kpi"><p>Omzet</p><h3 id="omzet">0</h3></div>
<div class="kpi"><p>Modal</p><h3 id="modal">0</h3></div>
<div class="kpi"><p>Profit</p><h3 id="profit">0</h3></div>
<div class="kpi"><p>ROI</p><h3 id="roi">0%</h3></div>
</div>

<div class="card"><canvas id="profitChart"></canvas></div>
<div class="card"><canvas id="gameChart"></canvas></div>
<div class="card"><p id="insight"></p></div>

</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="tab('home',this)">🏠</div>
<div onclick="tab('listTab',this)">📋</div>
<div onclick="tab('analyticsTab',this)">📊</div>
<div onclick="tab('businessTab',this)">💰</div>
</div>

<script>

// ===== HELPER =====
function rp(x){return "Rp "+(x||0).toLocaleString("id-ID")}
function num(v){return parseInt((v||"").toString().replace(/\D/g,''))||0}
function safe(v,def="Lainnya"){return v?v:def}

amount.oninput=()=>amount.value=rp(num(amount.value))

// ===== DATA =====
let data=JSON.parse(localStorage.getItem("data"))||[]
let syncedRef=new Set(data.map(d=>d.ref))

// ===== TAB =====
function tab(id,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'))
el.classList.add('active')
}

// ===== ADD =====
function addData(){
if(!desc.value||!amount.value)return
data.push({
id:Date.now(),
type:type.value,
desc:desc.value,
amount:num(amount.value),
category:category.value,
date:new Date().toLocaleDateString("id-ID")
})
desc.value="";amount.value=""
render()
}

// ===== DELETE =====
function del(id){
data=data.filter(d=>d.id!==id)
render()
}

// ===== AUTO SYNC =====
async function autoSync(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

sheet.forEach(a=>{
let status=(a.Status||"").toLowerCase()
if(status!=="sold") return

let name=safe(a.Nama,"Item")
if(syncedRef.has(name)) return

let harga=num(a.Harga)

data.push({
id:Date.now()+Math.random(),
type:"income",
desc:name,
amount:harga,
category:"Jual Akun",
date:new Date().toLocaleDateString("id-ID"),
ref:name
})

syncedRef.add(name)
})

render()
}

// ===== RENDER =====
function render(){

let income=0,expense=0
list.innerHTML=""

data.forEach(d=>{
let amt=num(d.amount)

if(d.type==="income") income+=amt
else expense+=amt

list.innerHTML+=`
<div class="item">
<div>
<b>${safe(d.desc,"-")}</b><br>
<small>${safe(d.category)} • ${safe(d.date)}</small>
</div>
<div>
${d.type==="income"?"+":"-"} ${rp(amt)}
<button onclick="del(${d.id})">🗑</button>
</div>
</div>`
})

balance.innerText=rp(income-expense)

localStorage.setItem("data",JSON.stringify(data))

analytics()
business()
}

// ===== ANALYTICS =====
function analytics(){

let cat={},daily={},income=0,expense=0

data.forEach(d=>{
let c=safe(d.category)
let amt=num(d.amount)

if(d.type==="expense"){
cat[c]=(cat[c]||0)+amt
expense+=amt
}else income+=amt

daily[d.date]=(daily[d.date]||0)+(d.type==="income"?amt:-amt)
})

if(window.pieC) pieC.destroy()
if(window.barC) barC.destroy()
if(window.lineC) lineC.destroy()

window.pieC=new Chart(pie,{type:'pie',data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}})
window.barC=new Chart(bar,{type:'bar',data:{labels:["Income","Expense"],datasets:[{data:[income,expense]}]}})
window.lineC=new Chart(line,{type:'line',data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily)}]}})
}

// ===== BUSINESS =====
async function business(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let omzet=0,modal=0,profit=0,game={}

sheet.forEach(a=>{
if((a.Status||"").toLowerCase()!=="sold") return

let h=num(a.Harga)
let m=num(a.Modal)

omzet+=h
modal+=m
profit+=(h-m)

game[a.Game]=(game[a.Game]||0)+1
})

omzet.innerText=rp(omzet)
modal.innerText=rp(modal)
profit.innerText=rp(profit)

let roiVal=modal?((profit/modal)*100).toFixed(1):0
roi.innerText=roiVal+"%"

insight.innerText=`🔥 Terlaris: ${Object.keys(game)[0]||"-"} | Profit ${rp(profit)}`

if(window.gc) gc.destroy()
if(window.pc) pc.destroy()

window.gc=new Chart(gameChart,{type:'bar',data:{labels:Object.keys(game),datasets:[{data:Object.values(game)}]}})
window.pc=new Chart(profitChart,{type:'line',data:{labels:["Hari Ini"],datasets:[{data:[profit]}]}})
}

// ===== INIT =====
render()
autoSync()
setInterval(autoSync,10000) // sync tiap 10 detik

</script>

</body>
</html>
