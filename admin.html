<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:Inter,sans-serif;
}

/* HEADER */
.header{
padding:18px;
font-size:18px;
font-weight:bold;
}

/* NAV */
.nav{
position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
justify-content:space-around;
background:rgba(15,23,42,.8);
padding:12px;
border-radius:20px;
backdrop-filter:blur(12px);
}
.nav div{opacity:.5;font-size:12px}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none;padding:14px;padding-bottom:90px}
.tab.active{display:block}

/* CARD */
.card{
background:#0f172a;
border-radius:18px;
padding:16px;
margin-top:12px;
border:1px solid rgba(255,255,255,0.05);
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#4ade80);
color:black;
font-weight:bold;
}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:12px;
margin-top:8px;
background:#020617;
border-radius:12px;
}

/* TOTAL */
.total{
display:flex;
justify-content:space-between;
font-size:14px;
}

/* CHART CENTER */
.chart-card{position:relative;text-align:center}
.chart-center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:14px;
color:#94a3b8;
}

/* PROGRESS */
.progress{
height:6px;
background:#1e293b;
border-radius:10px;
margin-top:4px;
}
.fill{
height:100%;
background:#22c55e;
border-radius:10px;
}

/* POPUP */
.popup{
position:fixed;
top:-50px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
color:black;
padding:10px 18px;
border-radius:10px;
opacity:0;
transition:.4s;
}
.popup.show{top:20px;opacity:1}

canvas{
filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.6));
}
</style>
</head>

<body>

<div class="popup" id="popup"></div>

<div class="header">Yuraaa Finance</div>

<!-- TAB 1 -->
<div id="home" class="tab active">
<div class="card">
<h3>Tambah Transaksi</h3>

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp">

<button onclick="addData()">Simpan</button>
</div>
</div>

<!-- TAB 2 -->
<div id="dashboard" class="tab">

<div class="card chart-card">
<canvas id="chart"></canvas>
<div class="chart-center" id="chartCenter"></div>
</div>

<div class="card">
<h3>🏆 Top Game</h3>
<div id="topList"></div>
</div>

<div class="card" id="insight"></div>

</div>

<!-- TAB 3 -->
<div id="history" class="tab">

<div class="card">
<div class="total">
<div>Masuk: <b id="income">0</b></div>
<div>Keluar: <b id="expense">0</b></div>
</div>
</div>

<div class="card">
<h3>Riwayat</h3>
<div id="list"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="tab('home',this)">🏠</div>
<div onclick="tab('dashboard',this)">📊</div>
<div onclick="tab('history',this)">📋</div>
</div>

<script>

function rp(x){return "Rp "+(x||0).toLocaleString("id-ID")}
function num(v){return parseInt((v||"").replace(/\D/g,''))||0}

let data=JSON.parse(localStorage.getItem("data"))||[]

function showPopup(t){
popup.innerText=t
popup.classList.add("show")
setTimeout(()=>popup.classList.remove("show"),1500)
}

function tab(id,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'))
el.classList.add('active')
}

function addData(){
if(!desc.value||!amount.value)return

data.push({
id:Date.now(),
type:type.value,
desc:desc.value,
amount:num(amount.value),
date:new Date().toLocaleDateString()
})

desc.value=""
amount.value=""

renderHistory()
showPopup("Tersimpan ✔")
}

function renderHistory(){
let inc=0,exp=0
list.innerHTML=""

data.forEach(d=>{
if(d.type=="income") inc+=d.amount
else exp+=d.amount

list.innerHTML+=`
<div class="item">
<div>${d.desc}</div>
<div style="color:${d.type=="income"?"#22c55e":"#ef4444"}">
${rp(d.amount)}
</div>
</div>`
})

income.innerText=rp(inc)
expense.innerText=rp(exp)

localStorage.setItem("data",JSON.stringify(data))
}

async function syncSold(){
const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let saved=new Set(data.map(d=>d.desc))

sheet.forEach(a=>{
if((a.Status||"").toLowerCase()!=="sold") return

let name="Jual Akun - "+(a.Nama||"Item")

if(saved.has(name)) return

data.push({
id:Date.now()+Math.random(),
type:"income",
desc:name,
amount:num(a.Harga),
date:new Date().toLocaleDateString()
})
})

renderHistory()
}

async function loadDashboard(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let map={}, total=0

sheet.forEach(a=>{
if((a.Status||"").toLowerCase()!=="sold") return

let game=a.Game||"Lainnya"
let harga=num(a.Harga)

map[game]=(map[game]||0)+harga
total+=harga
})

let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1])

if(window.chart) chart.destroy()

const ctx=document.getElementById("chart").getContext("2d")

window.chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:sorted.map(x=>x[0]),
datasets:[{
data:sorted.map(x=>x[1]),
backgroundColor:[
"#22c55e","#38bdf8","#f59e0b",
"#ef4444","#a78bfa","#14b8a6"
],
borderWidth:2,
borderColor:"#020617",
hoverOffset:12
}]
},
options:{
cutout:"75%",
plugins:{legend:{display:false}}
}
})

chartCenter.innerHTML=`<b>${rp(total)}</b><br><small>Total Omzet</small>`

topList.innerHTML=sorted.map(g=>{
let percent=(g[1]/total*100)||0
return `
<div style="margin-top:10px">
<div style="display:flex;justify-content:space-between;font-size:13px">
<span>${g[0]}</span>
<b>${rp(g[1])}</b>
</div>
<div class="progress">
<div class="fill" style="width:${percent}%"></div>
</div>
</div>`
}).join("")

let top=sorted[0]?.[0]||"-"
let val=sorted[0]?.[1]||0

insight.innerHTML=`🔥 <b>${top}</b> paling cuan <br>${rp(val)}`
}

renderHistory()
loadDashboard()
syncSold()
setInterval(syncSold,10000)

</script>

</body>
</html>
