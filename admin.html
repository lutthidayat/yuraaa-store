<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yuraaa | Finance & Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#020617;
    --bg2:#0b1020;
    --panel:rgba(15,23,42,.78);
    --panel2:rgba(2,6,23,.56);
    --line:rgba(148,163,184,.16);
    --text:#e5e7eb;
    --muted:#94a3b8;
    --muted2:#64748b;
    --accent:#8b5cf6;
    --accent2:#60a5fa;
    --green:#22c55e;
    --red:#ef4444;
    --yellow:#fbbf24;
    --shadow:0 22px 60px rgba(2,6,23,.5);
    --radius:24px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color-scheme: dark;
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(139,92,246,.18), transparent 45%),
      radial-gradient(800px 420px at 10% 0%, rgba(96,165,250,.12), transparent 40%),
      linear-gradient(180deg,#020617 0%,#050816 100%);
    color:var(--text);
    overflow-x:hidden;
  }
  body.locked{overflow:hidden}
  body.locked .app{
    pointer-events:none;
    user-select:none;
    transform:scale(.996);
  }
  .app{
    min-height:100vh;
    transition:filter .25s ease, transform .25s ease;
    width:min(1440px,100%);
    margin:0 auto;
    padding:14px clamp(12px,2vw,20px) 28px;
  }

  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 14px;
    background:rgba(2,6,23,.72);
    backdrop-filter:blur(18px);
    border:1px solid rgba(148,163,184,.12);
    border-radius:28px;
    box-shadow:var(--shadow);
    flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:0;flex:1 1 320px}
  .logo{
    width:50px;height:50px;border-radius:18px;
    display:grid;place-items:center;
    background:linear-gradient(180deg, rgba(139,92,246,.26), rgba(59,130,246,.14));
    border:1px solid rgba(167,139,250,.22);
    box-shadow:var(--shadow);
    flex:0 0 auto;
    font-size:22px;
  }
  .brand h1{
    margin:0;
    font-size:20px;
    line-height:1.1;
    font-weight:950;
    letter-spacing:-.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .brand h1 span{color:var(--accent)}
  .brand p{
    margin:4px 0 0;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;flex:1 1 420px}
  .btn{
    appearance:none;border:none;cursor:pointer;font:inherit;
    font-weight:900;height:46px;padding:0 16px;
    border-radius:16px;display:inline-flex;align-items:center;justify-content:center;
    gap:8px;color:#fff;transition:.18s ease;text-decoration:none;
    white-space:nowrap;
  }
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0) scale(.98)}
  .btn:disabled{opacity:.65;cursor:not-allowed;transform:none}
  .btn-primary{background:linear-gradient(180deg,var(--accent),var(--accent2));box-shadow:0 14px 34px rgba(139,92,246,.18)}
  .btn-secondary{background:rgba(15,23,42,.72);border:1px solid var(--line)}
  .btn-danger{background:linear-gradient(180deg,#ef4444,#b91c1c)}
  .btn-ghost{background:transparent;border:1px solid rgba(148,163,184,.18)}
  .btn-green{background:linear-gradient(180deg,#22c55e,#15803d)}
  .btn-blue{background:linear-gradient(180deg,#0ea5e9,#0369a1)}
  .pill{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 14px;border-radius:999px;
    background:rgba(16,185,129,.10);
    color:#86efac;border:1px solid rgba(16,185,129,.18);
    font-size:12px;font-weight:800;width:max-content;
    box-shadow:0 10px 30px rgba(16,185,129,.08);
  }
  .pill.warn{
    background:rgba(245,158,11,.10);
    color:#fbbf24;border-color:rgba(245,158,11,.18);
  }
  .hero{
    display:grid;
    grid-template-columns:minmax(0,1.25fr) minmax(320px,.75fr);
    gap:14px;
    margin-top:14px;
  }
  .panel{
    background:linear-gradient(180deg, rgba(15,23,42,.94), rgba(8,13,28,.96));
    border:1px solid rgba(148,163,184,.14);
    border-radius:28px;
    box-shadow:var(--shadow);
  }
  .hero-main{padding:22px}
  .hero-side{padding:18px;display:grid;gap:12px}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 12px;border-radius:999px;
    background:rgba(2,6,23,.38);
    border:1px solid rgba(148,163,184,.12);
    color:#dbeafe;font-size:12px;font-weight:800;
  }
  .hero h2{
    margin:14px 0 10px;
    font-size:clamp(30px,4vw,54px);
    line-height:1.02;letter-spacing:-.04em;font-weight:950;
    max-width:12ch;
  }
  .hero h2 span{color:var(--accent)}
  .hero p{
    margin:0;color:var(--muted);line-height:1.7;font-size:14px;
    max-width:64ch;
  }
  .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .hero-actions .btn{min-width:180px}
  .stats{display:grid;gap:12px}
  .stat{
    padding:16px;border-radius:22px;
    background:rgba(2,6,23,.28);
    border:1px solid rgba(148,163,184,.10);
    min-height:108px;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .stat .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800}
  .stat .value{font-size:20px;font-weight:950;letter-spacing:-.02em;margin-top:8px}
  .stat .sub{font-size:12px;color:#cbd5e1;line-height:1.5;margin-top:4px}
  .value.income{color:#86efac}
  .value.expense{color:#fca5a5}
  .value.balance{color:#d8b4fe}

  .layout{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
@media (min-width: 1180px){
  .layout{grid-template-columns:repeat(2,minmax(0,1fr));align-items:start}
}
@media (min-width: 1400px){
  .dash-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
  .section{padding:18px}
  .section-head{
    display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:14px
  }
  .section-head h3{margin:0;font-size:18px;font-weight:950}
  .section-head p{margin:6px 0 0;color:var(--muted);font-size:12px;line-height:1.5}
  .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .field{display:flex;flex-direction:column;gap:8px}
  .field.full{grid-column:1 / -1}
  .label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}
  .input, .select, .textarea{
    width:100%;
    border-radius:18px;
    border:1px solid rgba(148,163,184,.16);
    background:rgba(2,6,23,.42);
    color:#fff;
    outline:none;
    font:inherit;
    transition:.18s ease;
  }
  .input:focus, .select:focus, .textarea:focus{
    border-color:rgba(139,92,246,.56);
    box-shadow:0 0 0 4px rgba(139,92,246,.12);
    transform:translateY(-1px);
  }
  .input, .select{height:52px;padding:0 14px;font-weight:700}
  .textarea{min-height:112px;padding:14px;resize:vertical;line-height:1.6;font-weight:600}
  .input::placeholder, .textarea::placeholder{color:#64748b}
  input, select, textarea{color:#fff !important;}
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus,
  textarea:-webkit-autofill,
  textarea:-webkit-autofill:hover,
  textarea:-webkit-autofill:focus,
  select:-webkit-autofill,
  select:-webkit-autofill:hover,
  select:-webkit-autofill:focus{
    -webkit-text-fill-color:#fff !important;
    -webkit-box-shadow:0 0 0 1000px #020617 inset !important;
    box-shadow:0 0 0 1000px #020617 inset !important;
    caret-color:#fff !important;
    transition:background-color 9999s ease-in-out 0s;
    background-clip:content-box !important;
  }
  select option{background:#020617;color:#fff}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .controls .btn{flex:1 1 180px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .mini-card{
    padding:16px;border-radius:22px;
    background:rgba(2,6,23,.28);
    border:1px solid rgba(148,163,184,.10);
  }
  .mini-card h4{margin:0 0 6px;font-size:14px;font-weight:900}
  .mini-card p{margin:0;color:var(--muted);font-size:12px;line-height:1.5}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search-row{display:grid;grid-template-columns:1fr auto;gap:10px}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    padding:8px 12px;border-radius:999px;
    background:rgba(2,6,23,.38);
    border:1px solid rgba(148,163,184,.12);
    color:#dbeafe;font-size:12px;font-weight:800;
    cursor:pointer;transition:.18s ease;
  }
  .chip.active{background:rgba(139,92,246,.18);border-color:rgba(139,92,246,.28)}
  .history-head{
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px
  }
  .history-head h3{margin:0;font-size:18px;font-weight:950}
  .history-head p{margin:3px 0 0;color:var(--muted);font-size:12px;line-height:1.5}
  .history-list{display:flex;flex-direction:column;gap:12px}
  .tx{
    position:relative;overflow:hidden;border-radius:22px;
    background:linear-gradient(180deg, rgba(15,23,42,.78), rgba(2,6,23,.58));
    border:1px solid rgba(148,163,184,.12);
    box-shadow:0 16px 40px rgba(0,0,0,.18);
    padding:14px;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    will-change:transform;
  }
  .tx:hover{
    transform:translateY(-1px);
    box-shadow:0 18px 44px rgba(0,0,0,.22);
    border-color:rgba(148,163,184,.18);
  }
  .tx:active{transform:translateY(0) scale(.985)}
  .tx-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .tx-left{display:flex;gap:12px;min-width:0;align-items:flex-start}
  .icon{
    width:46px;height:46px;border-radius:16px;display:grid;place-items:center;
    font-size:20px;flex:0 0 auto;
    background:rgba(139,92,246,.12);
    border:1px solid rgba(139,92,246,.18);
  }
  .icon.income{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.18)}
  .icon.expense{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.18)}
  .tx-title{
    font-size:15px;font-weight:950;line-height:1.3;margin:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;
  }
  .tx-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .meta-pill{
    padding:6px 8px;border-radius:999px;
    background:rgba(2,6,23,.42);
    border:1px solid rgba(148,163,184,.12);
    color:#cbd5e1;font-size:11px;font-weight:800;
  }
  .amount{font-size:16px;font-weight:950;white-space:nowrap}
  .amount.income{color:#86efac}
  .amount.expense{color:#fca5a5}
  .tx-note{margin:10px 0 0;color:#cbd5e1;font-size:12px;line-height:1.6}
  .tx-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .tx-actions .btn{height:38px;border-radius:12px;font-size:12px;padding:0 12px}
  .empty{
    padding:24px;text-align:center;color:var(--muted);
    border-radius:22px;border:1px dashed rgba(148,163,184,.22);
    background:rgba(2,6,23,.18);
    animation:fadeInUp .3s ease;
  }
  @keyframes fadeInUp{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:none}
  }
  .toast{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(18px) scale(.95);
    background:rgba(15,23,42,.96);
    color:#fff;border:1px solid rgba(148,163,184,.16);
    border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:.22s ease, transform .22s ease;z-index:99;
    max-width:min(92vw,560px);text-align:center;font-size:13px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  .overlay{
    position:fixed;inset:0;background:rgba(2,6,23,.72);backdrop-filter:blur(14px);
    display:none;align-items:center;justify-content:center;padding:18px;z-index:100;
  }
  .overlay.open{display:flex}
  .modal{
    width:min(720px,100%);
    border-radius:28px;
    background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(8,13,28,.98));
    border:1px solid rgba(148,163,184,.16);
    box-shadow:0 40px 120px rgba(0,0,0,.65);
    padding:18px;
  }
  .modal-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
  .modal-top h4{margin:0;font-size:20px;font-weight:950}
  .modal-top p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
  .close-x{
    width:40px;height:40px;border-radius:14px;border:1px solid rgba(148,163,184,.16);
    background:rgba(15,23,42,.8);color:#fff;cursor:pointer;font-size:18px;
    display:grid;place-items:center;
  }
  .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .modal-actions .btn{flex:1 1 160px;height:46px}
  .helper{font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}

  .endpoint-modal{width:min(560px,100%)}
  .endpoint-modal .helper{margin-top:10px}
  .endpoint-badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 12px;border-radius:999px;
    background:rgba(139,92,246,.14);
    border:1px solid rgba(139,92,246,.22);
    color:#d8b4fe;font-size:12px;font-weight:900;
    margin-bottom:12px;
  }

  .footer-space{height:20px}

  .pin-overlay{
    position:fixed;
    inset:0;
    z-index:120;
    background:rgba(2,6,23,.92);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    pointer-events:auto;
  }
  .pin-overlay.hidden{display:none}
  .pin-card{
    width:min(620px,100%);
    border-radius:30px;
    padding:18px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(8,13,28,.98));
    border:1px solid rgba(148,163,184,.16);
    box-shadow:0 42px 120px rgba(0,0,0,.68);
    margin:auto;
  }
  .pin-card::before{
    content:"";position:absolute;inset:-28% -18% auto auto;width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle, rgba(139,92,246,.18), transparent 65%);
    pointer-events:none
  }
  .pin-card::after{
    content:"";position:absolute;inset:auto auto -35% -12%;width:220px;height:220px;border-radius:50%;
    background:radial-gradient(circle, rgba(34,197,94,.08), transparent 65%);
    pointer-events:none
  }
  .pin-top{
    display:flex;justify-content:space-between;align-items:flex-start;gap:14px;
    margin-bottom:18px
  }
  .pin-top > div:first-child{
    max-width:calc(100% - 52px)
  }
  .pin-title{
    margin:0;
    font-size:clamp(30px,4vw,44px);
    line-height:1.02;
    font-weight:950;
    letter-spacing:-.04em;
  }
  .pin-sub{
    margin:8px 0 0;
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
    max-width:36ch;
  }
  .pin-close{
    width:50px;height:50px;border-radius:18px;
    border:1px solid rgba(148,163,184,.16);
    background:rgba(15,23,42,.82);
    color:#fff;cursor:pointer;
    font-size:22px;
    display:grid;place-items:center;
    flex:0 0 auto;
  }
  .pin-body{
    display:flex;flex-direction:column;gap:14px;
    margin-top:16px
  }
  .pin-label{
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#cbd5e1;
    font-weight:900;
  }
  .pin-input{
    width:100%;
    height:72px;
    border-radius:22px;
    padding:0 18px;
    background:rgba(2,6,23,.42);
    color:#fff;
    border:1px solid rgba(148,163,184,.16);
    outline:none;
    font-size:28px;
    letter-spacing:.55em;
    font-weight:950;
    text-align:center;
    caret-color:var(--accent);
    appearance:textfield;
    -webkit-appearance:textfield;
  }
  .pin-input::placeholder{
    color:#64748b;
    letter-spacing:.35em;
  }
  .pin-input:focus{
    border-color:rgba(139,92,246,.58);
    box-shadow:0 0 0 4px rgba(139,92,246,.12)
  }
  .pin-actions{
    display:flex;
    gap:12px;
    margin-top:6px;
    justify-content:center;
  }
  .btn.small{
    height:56px;
    border-radius:18px;
    font-size:16px;
    min-width:0;
    flex:1 1 0;
    max-width:220px;
  }
  .btn.btn-secondary.small{
    background:rgba(15,23,42,.82);
    border:1px solid rgba(148,163,184,.16);
  }
  .btn.btn-primary.small{
    box-shadow:0 14px 34px rgba(139,92,246,.18)
  }
  .pin-msg{
    min-height:24px;
    font-size:13px;
    color:#fca5a5;
    opacity:0;
    transform:translateY(-4px);
    transition:opacity .2s ease, transform .2s ease
  }
  .pin-msg.show{opacity:1;transform:none}
  .shake{animation:shake .45s ease}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-8px)}
    30%{transform:translateX(8px)}
    45%{transform:translateX(-6px)}
    60%{transform:translateX(6px)}
    75%{transform:translateX(-3px)}
  }

  .floating-add{
    position:fixed;right:16px;bottom:16px;z-index:30;
    height:52px;padding:0 16px;border-radius:999px;border:1px solid rgba(74,222,128,.35);
    background:linear-gradient(180deg, rgba(34,197,94,.95), rgba(22,163,74,.95));
    color:#fff;cursor:pointer;box-shadow:0 16px 40px rgba(34,197,94,.18);
    font-weight:950;display:none;
  }
  .floating-add.show{display:inline-flex;align-items:center;gap:8px}

  .loading-layer{
    position:fixed;inset:0;z-index:110;display:none;align-items:center;justify-content:center;padding:18px;
    background:rgba(2,6,23,.42);backdrop-filter:blur(12px);
  }
  .loading-layer.show{display:flex}
  .loading-box{
    width:min(420px,100%);
    padding:22px;border-radius:24px;
    background:rgba(15,23,42,.98);
    border:1px solid rgba(148,163,184,.18);
    box-shadow:0 40px 120px rgba(0,0,0,.55);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    text-align:center;
    animation:popIn .24s ease;
    transform-origin:center;
  }
  @keyframes popIn{
    from{opacity:0;transform:translateY(10px) scale(.98)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }
  .ring{
    width:40px;height:40px;border-radius:50%;
    border:3px solid rgba(255,255,255,.16);border-top-color:#8b5cf6;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Dashboard account cards */
  .dash-toolbar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
  }
  .dash-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
  }
  .account-card{
    position:relative;overflow:hidden;border-radius:24px;
    background:rgba(2,6,23,.30);
    border:1px solid rgba(148,163,184,.14);
    box-shadow:0 16px 40px rgba(0,0,0,.22);
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    will-change:transform;
    display:flex;flex-direction:column;min-height:100%;
  }
  .account-card:hover{
    transform:translateY(-1px);
    border-color:rgba(167,139,250,.28);
    box-shadow:0 20px 50px rgba(0,0,0,.28);
  }
  .account-card:active{transform:translateY(0) scale(.975)}
  .card-media{position:relative;aspect-ratio:16/10;background:#0b1220;overflow:hidden}
  .card-media img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb-empty{width:100%;height:100%;display:grid;place-items:center;color:#94a3b8;font-size:13px;padding:16px;text-align:center;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.98))}
  .card-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .card-title{
    font-size:16px;font-weight:900;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;min-height:2.7em;
  }
  .card-id{
    color:#c4b5fd;
    font-size:11px;
    font-weight:900;
    letter-spacing:.06em;
    text-transform:uppercase;
    line-height:1.2;
  }
  .card-sub{color:#94a3b8;font-size:12px;line-height:1.5}
  .card-price{font-size:15px;font-weight:900}
  .card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto}
