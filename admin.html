<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:sans-serif;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px;
}
.nav div{opacity:.5}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none;padding:12px}
.tab.active{display:block}

/* CARD */
.card{
background:linear-gradient(145deg,#0f172a,#020617);
border-radius:16px;
padding:14px;
margin-top:10px;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
background:#020617;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:10px;
margin-top:6px;
background:#0f172a;
border-radius:10px;
font-size:13px;
}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
color:black;
padding:10px 20px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="popup" id="popup">Berhasil</div>

<!-- TAB 1 -->
<div id="home" class="tab active">

<div class="card">
<h3>Tambah Transaksi</h3>

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp">

<button onclick="addData()">Simpan</button>

<button onclick="window.location.href='index.html'" style="background:#ef4444;color:white">
Keluar
</button>

</div>

</div>

<!-- TAB 2 -->
<div id="dashboard" class="tab">

<div class="card">
<select id="chartType" onchange="loadDashboard()">
<option value="doughnut">Donut</option>
<option value="pie">Pie</option>
<option value="bar">Bar</option>
</select>

<canvas id="pie"></canvas>
</div>

<div class="card">
<h3>Top Game</h3>
<div id="topList"></div>
</div>

<div class="card" id="insight"></div>

</div>

<!-- TAB 3 -->
<div id="history" class="tab">

<div class="card">
<h3>Riwayat</h3>
<div id="list"></div>
</div>

<div class="card">
<b>Masuk:</b> <span id="income">0</span><br>
<b>Keluar:</b> <span id="expense">0</span>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="tab('home',this)">🏠</div>
<div onclick="tab('dashboard',this)">📊</div>
<div onclick="tab('history',this)">📋</div>
</div>

<script>

// ===== HELPER =====
function rp(x){return "Rp "+(x||0).toLocaleString("id-ID")}
function num(v){return parseInt((v||"").replace(/\D/g,''))||0}

// ===== DATA =====
let data=JSON.parse(localStorage.getItem("data"))||[]

// ===== POPUP =====
function showPopup(text){
popup.innerText=text
popup.style.display="block"
setTimeout(()=>popup.style.display="none",1500)
}

// ===== TAB =====
function tab(id,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'))
el.classList.add('active')
}

// ===== ADD =====
function addData(){
if(!desc.value||!amount.value) return

data.push({
id:Date.now(),
type:type.value,
desc:desc.value,
amount:num(amount.value),
date:new Date().toLocaleDateString()
})

desc.value=""
amount.value=""

renderHistory()
showPopup("Tersimpan ✔")
}

// ===== HISTORY =====
function renderHistory(){
let inc=0,exp=0
list.innerHTML=""

data.forEach(d=>{
if(d.type=="income") inc+=d.amount
else exp+=d.amount

list.innerHTML+=`
<div class="item">
<div>${d.desc}</div>
<div style="color:${d.type=="income"?"#22c55e":"#ef4444"}">
${rp(d.amount)}
</div>
</div>`
})

income.innerText=rp(inc)
expense.innerText=rp(exp)

localStorage.setItem("data",JSON.stringify(data))
}

// ===== SYNC SOLD =====
async function syncSold(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let saved=new Set(data.map(d=>d.desc))

sheet.forEach(a=>{
if((a.Status||"").toLowerCase()!=="sold") return

let name="Jual Akun - "+(a.Nama||"Item")

if(saved.has(name)) return

data.push({
id:Date.now()+Math.random(),
type:"income",
desc:name,
amount:num(a.Harga),
date:new Date().toLocaleDateString()
})
})

renderHistory()
}

// ===== DASHBOARD =====
async function loadDashboard(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let map={}

sheet.forEach(a=>{
if((a.Status||"").toLowerCase()!=="sold") return

let game=a.Game||"Lainnya"
map[game]=(map[game]||0)+num(a.Harga)
})

let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1])

let type=chartType.value||"doughnut"

if(window.chart) chart.destroy()

window.chart=new Chart(pie,{
type:type,
data:{
labels:sorted.map(x=>x[0]),
datasets:[{
label:"Omzet",
data:sorted.map(x=>x[1]),
backgroundColor:[
"#22c55e","#38bdf8","#f59e0b",
"#ef4444","#a78bfa","#14b8a6"
]
}]
}
})

// TOP
let html=""
sorted.forEach(g=>{
html+=`
<div class="item">
<div>${g[0]}</div>
<div>${rp(g[1])}</div>
</div>`
})
topList.innerHTML=html

// INSIGHT
let top=sorted[0]?.[0]||"-"
let val=sorted[0]?.[1]||0

insight.innerHTML=`🔥 Game paling cuan: <b>${top}</b><br>${rp(val)}`
}

// INIT
renderHistory()
loadDashboard()
syncSold()
setInterval(syncSold,10000)

</script>

</body>
</html>
