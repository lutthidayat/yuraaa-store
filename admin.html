<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#020617;color:white}

/* LOGIN */
#loginPage{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.login-box{
background:#0f172a;
padding:25px;
border-radius:16px;
width:90%;
max-width:300px;
text-align:center;
}

/* CARD */
.card{
margin:12px;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.05);
}

.balance{
font-size:26px;
color:#22c55e;
font-weight:bold;
}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:10px;
margin-top:8px;
background:rgba(255,255,255,0.05);
border-radius:10px;
}

/* INPUT */
input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
}

button{background:#22c55e;color:white}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

/* FAB */
.fab{
position:fixed;
bottom:80px;
right:20px;
width:60px;height:60px;
border-radius:50%;
background:#22c55e;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

/* PROGRESS */
.progress{
width:150px;height:150px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
background:conic-gradient(#22c55e 0%,#1e293b 0%);
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#111827;
padding:20px;
border-radius:15px;
width:90%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 Admin Login</h2>
<input id="passwordInput" type="password" placeholder="Password">
<button onclick="checkLogin()">Masuk</button>
<p id="errorText" style="color:red;display:none">Password salah!</p>
</div>
</div>

<!-- DASHBOARD -->
<div class="card">
<div class="balance" id="balance">Rp0</div>
</div>

<div id="home" class="tab active">
<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Riwayat</h3>
<div id="list"></div>
</div>
</div>

<div id="targetTab" class="tab">
<div class="card">
<input id="target" placeholder="Target uang">
<div class="progress" id="progress">0%</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" type="number" placeholder="Jumlah">

<select id="category">
<option>Jual Akun</option>
<option>Topup</option>
<option>Pribadi</option>
</select>

<button onclick="addData()">Simpan</button>
<button onclick="closeModal()">Tutup</button>

</div>
</div>

<div class="fab" onclick="openModal()">+</div>

<div class="nav">
<div onclick="switchTab('home')">🏠</div>
<div onclick="switchTab('targetTab')">🎯</div>
</div>

<script>

// LOGIN
function checkLogin(){
    let pass = document.getElementById("passwordInput").value;

    if(pass === "123"){ // ganti password
        document.getElementById("loginPage").style.display="none";
    }else{
        document.getElementById("errorText").style.display="block";
        setTimeout(()=>{
            window.location.href="index.html";
        },1500);
    }
}

// DATA
let data = JSON.parse(localStorage.getItem("data")) || [];
let targetVal = localStorage.getItem("target") || 0;

const list = document.getElementById("list");
const balance = document.getElementById("balance");
const progress = document.getElementById("progress");
const targetInput = document.getElementById("target");
const chartCanvas = document.getElementById("chart");

targetInput.value = targetVal;

// TAB
function switchTab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// MODAL
function openModal(){modal.style.display="flex";}
function closeModal(){modal.style.display="none";}

// FORMAT
function rp(x){
return "Rp"+(x||0).toLocaleString("id-ID");
}

// RENDER
function render(){
list.innerHTML="";
let income=0,expense=0;

data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

let el=document.createElement("div");
el.className="item";
el.innerHTML=
"<div><b>"+d.desc+"</b><br><small>"+d.category+"</small></div>"
+"<div style='color:"+(d.type=="income"?"#22c55e":"#ef4444")+"'>"
+(d.type=="income"?"+":"-")+" "+rp(d.amount)+"</div>";

list.appendChild(el);
});

let total=income-expense;
balance.innerText=rp(total);

// chart
if(window.chart) chart.destroy();
window.chart=new Chart(chartCanvas,{
type:"bar",
data:{
labels:["Masuk","Keluar"],
datasets:[{data:[income,expense]}]
}
});

// progress
let t=parseInt(targetInput.value)||0;
let p=t?Math.min((total/t)*100,100):0;

progress.innerText=Math.floor(p)+"%";
progress.style.background="conic-gradient(#22c55e "+p+"%,#1e293b 0%)";

localStorage.setItem("data",JSON.stringify(data));
localStorage.setItem("target",t);
}

// ADD
function addData(){
let d={
type:type.value,
desc:desc.value,
amount:parseInt(amount.value),
category:category.value
};

if(!d.desc||!d.amount)return alert("Isi dulu!");

data.push(d);
closeModal();
render();
}

// AUTO
targetInput.addEventListener("input",render);

render();

</script>

</body>
</html>
