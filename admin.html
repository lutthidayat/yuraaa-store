<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

/* ===== CLOSE ===== */
.close-btn{
  position:fixed;
  top:16px;right:16px;
  background:#0f172a;
  width:42px;height:42px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  z-index:10;
}

/* ===== WRAP ===== */
.wrap{padding:20px;display:none}

/* ===== CARD ===== */
.card{
  background:rgba(15,23,42,.6);
  padding:20px;
  border-radius:24px;
  margin-bottom:16px;
  backdrop-filter:blur(20px);
  transition:.3s;
}
.card:hover{transform:scale(1.02);}

.value{font-size:32px;font-weight:900;}
.green{color:#22c55e}

/* ===== HISTORY ===== */
.item{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:12px;
  opacity:0;
  transform:translateY(10px);
  transition:.3s;
}
.item.show{opacity:1;transform:none}

/* ===== PIN ===== */
.pin-modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
}

.pin-box{
  background:#020617;
  padding:24px;
  border-radius:20px;
  text-align:center;
  width:300px;
}

.pin-inputs{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-top:10px;
}

.pin-input{
  width:40px;height:50px;
  font-size:20px;
  text-align:center;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:#fff;
}

.pin-box.shake{
  animation:shake .4s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}
</style>
</head>

<body>

<div class="close-btn" onclick="location.href='/'">✕</div>

<!-- PIN -->
<div class="pin-modal" id="pinModal">
  <div class="pin-box" id="pinBox">
    <h3>Masukkan PIN</h3>
    <div class="pin-inputs">
      <input maxlength="1" class="pin-input">
      <input maxlength="1" class="pin-input">
      <input maxlength="1" class="pin-input">
      <input maxlength="1" class="pin-input">
      <input maxlength="1" class="pin-input">
      <input maxlength="1" class="pin-input">
    </div>
  </div>
</div>

<div class="wrap" id="main">

  <div class="card">
    <div>Total Masuk</div>
    <div class="value green" id="total">Rp 0</div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Riwayat</h3>
    <div id="list"></div>
  </div>

</div>

<script>
const API = "https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List";
const PIN = "211202";

// PIN INPUT
const inputs = document.querySelectorAll(".pin-input");

inputs.forEach((inp,i)=>{
  inp.addEventListener("input",()=>{
    if(inp.value && i < inputs.length-1){
      inputs[i+1].focus();
    }
    checkPin();
  });
});

function checkPin(){
  const val = [...inputs].map(i=>i.value).join("");

  if(val.length === 6){
    if(val === PIN){
      document.getElementById("pinModal").style.display="none";
      document.getElementById("main").style.display="block";
      load();
    }else{
      const box = document.getElementById("pinBox");
      box.classList.add("shake");

      setTimeout(()=>{
        box.classList.remove("shake");
        inputs.forEach(i=>i.value="");
        inputs[0].focus();
      },400);

      setTimeout(()=>{
        alert("PIN salah!");
        location.href="/";
      },800);
    }
  }
}

// LOAD DATA
function load(){
  fetch(API)
    .then(res=>res.json())
    .then(data=>render(data));
}

// RENDER
function render(data){
  const sold = data.filter(x => (x.Status||"").toLowerCase().includes("sold"));

  const total = sold.reduce((s,x)=>
    s + Number((x.Harga||"").replace(/[^\d]/g,'')),0
  );

  document.getElementById("total").textContent =
    "Rp " + total.toLocaleString("id-ID");

  // CHART
  const labels = sold.slice(0,10).map(x=>x.Nama);
  const values = sold.slice(0,10).map(x=>
    Number((x.Harga||"").replace(/[^\d]/g,''))
  );

  new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels,
      datasets:[{
        data:values
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{display:false}}
    }
  });

  // LIST
  const list = document.getElementById("list");

  list.innerHTML = sold.map((x,i)=>`
    <div class="item" style="transition-delay:${i*0.05}s">
      <div>${x.Nama}</div>
      <div class="green">Rp ${Number((x.Harga||"").replace(/[^\d]/g,'')).toLocaleString("id-ID")}</div>
    </div>
  `).join("");

  setTimeout(()=>{
    document.querySelectorAll(".item").forEach(el=>{
      el.classList.add("show");
    });
  },100);
}
</script>

</body>
</html>
