<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:white}

/* BACK */
.back{position:fixed;top:15px;left:15px;z-index:999;}
.back button{
background:#1e293b;color:white;border:none;
padding:8px 12px;border-radius:10px;font-size:12px;opacity:0.9;
}

/* LOGOUT */
.logout{
position:fixed;
top:15px;
right:15px;
z-index:999;
background:#1e293b;
padding:8px;
border-radius:10px;
font-size:12px;
opacity:0.7;
}
.logout:active{opacity:0.4}

/* LOGIN */
#loginPage{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:#020617;z-index:9999;
}
.login-box{
background:#0f172a;padding:25px;border-radius:16px;
width:90%;max-width:300px;text-align:center;
}

/* PIN */
.pin-input{
text-align:center;
font-size:22px;
letter-spacing:8px;
}

/* CARD */
.card{
margin:12px;padding:15px;border-radius:16px;
background:rgba(255,255,255,0.05);
}

/* INPUT */
input,select{
width:100%;padding:12px;margin-top:10px;
border-radius:10px;border:none;
background:#020617;color:white;
}

/* BUTTON */
button{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:10px;
background:#22c55e;color:black;font-weight:bold;
}
.reset{background:#ef4444;color:white}

/* NAV */
.nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#020617;padding:10px;
}
.nav div{opacity:0.5}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* BALANCE */
.balance{
text-align:center;
font-size:28px;
color:#22c55e;
margin:20px 0;
}

/* LIST */
.item{
display:flex;justify-content:space-between;
padding:12px;margin-top:8px;
background:#0f172a;border-radius:10px;
}

/* TARGET */
.target-box{
background:#0f172a;padding:12px;border-radius:12px;margin-top:10px;
}
.progress-bar{
height:6px;background:#1e293b;border-radius:10px;margin-top:6px;overflow:hidden;
}
.progress-fill{
height:100%;background:#22c55e;
}

/* MODAL */
#modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;align-items:center;justify-content:center;
animation:fadeIn 0.2s;
}
.modal-box{
background:#0f172a;
padding:20px;
border-radius:16px;
width:85%;
max-width:320px;
animation:scaleUp 0.2s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleUp{from{transform:scale(0.9)}to{transform:scale(1)}}
</style>
</head>

<body>

<!-- BACK -->
<div class="back">
<button onclick="goBack()">⬅ Kembali</button>
</div>

<!-- LOGOUT -->
<div class="logout" onclick="logout()">⎋</div>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 PIN</h2>
<input id="pin" type="password" placeholder="••••" class="pin-input">
<button onclick="login()">Masuk</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="tab active">
<div class="balance" id="balance">Rp 0</div>

<div class="card">
<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp 0">

<button onclick="addData()">Simpan</button>
</div>
</div>

<!-- TARGET -->
<div id="targetTab" class="tab">
<div class="card">
<h3>🎯 Target</h3>
<div id="targetList"></div>
<button onclick="openAddTarget()">+ Tambah Target</button>
</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card">
<div id="list"></div>
<button class="reset" onclick="resetAll()">Reset Semua</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="switchTab('home',this)">🏠</div>
<div onclick="switchTab('targetTab',this)">🎯</div>
<div onclick="switchTab('listTab',this)">📋</div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h3 id="modalTitle"></h3>

<input id="modalInput" placeholder="Rp 0">

<div style="display:flex;gap:10px;margin-top:10px">
<button id="confirmBtn" style="background:#ef4444;color:white">Konfirmasi</button>
<button onclick="closeModal()" style="background:#1e293b;color:white">Batal</button>
</div>
</div>
</div>

<script>

const SHOP_URL = "index.html";

// LOGIN
function login(){
if(pin.value==="1234"){
loginPage.style.display="none";
}else{
window.location.href = SHOP_URL;
}
}

// BACK
function goBack(){
window.location.href = SHOP_URL;
}

// LOGOUT
function logout(){
loginPage.style.display="flex";
}

// FORMAT Rp
function formatRp(v){
v=v.replace(/[^0-9]/g,"");
return "Rp " + (v?parseInt(v).toLocaleString("id-ID"):"0");
}
function getNum(v){
return parseInt(v.replace(/[^0-9]/g,""))||0;
}
function rp(x){
return "Rp " + (x||0).toLocaleString("id-ID");
}

amount.oninput=()=>amount.value=formatRp(amount.value);
modalInput.oninput=()=>modalInput.value=formatRp(modalInput.value);

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[];
let targets=JSON.parse(localStorage.getItem("targets"))||[];

let mode=null,selectedIndex=null;

// TAB
function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

// MODAL
function openModal(title){
modal.style.display="flex";
modalTitle.innerText=title;
modalInput.value="";
modalInput.style.display="block";
}
function closeModal(){modal.style.display="none";}

// RESET
function resetAll(){
mode="reset";
openModal("Reset semua data?");
modalInput.style.display="none";
}

// CONFIRM
confirmBtn.onclick=function(){

if(mode==="reset"){
data=[];targets=[];
localStorage.clear();
render();renderTargets();
}

if(mode==="delete"){
targets.splice(selectedIndex,1);
renderTargets();
}

if(mode==="addTarget"){
targets.push({name:"Target "+(targets.length+1),target:getNum(modalInput.value),current:0});
renderTargets();
}

if(mode==="addMoney"){
targets[selectedIndex].current+=getNum(modalInput.value);
renderTargets();
}

closeModal();
}

// DATA
function addData(){
if(!desc.value || !amount.value)return;
data.push({
type:type.value,
desc:desc.value,
amount:getNum(amount.value)
});
desc.value="";amount.value="";
render();
}

// TARGET
function openAddTarget(){
mode="addTarget";
openModal("Tambah Target");
}

function addMoney(i){
mode="addMoney";
selectedIndex=i;
openModal("Tambah Uang");
}

function deleteTarget(i){
mode="delete";
selectedIndex=i;
openModal("Hapus target?");
modalInput.style.display="none";
}

// RENDER TARGET
function renderTargets(){
targetList.innerHTML="";
targets.forEach((t,i)=>{
let p=Math.min((t.current/t.target)*100,100);
targetList.innerHTML+=`
<div class="target-box">
<div style="display:flex;justify-content:space-between">
<b>${t.name}</b>
<div>
<span onclick="addMoney(${i})">➕</span>
<span onclick="deleteTarget(${i})">🗑</span>
</div>
</div>
<small>${rp(t.current)} / ${rp(t.target)}</small>
<div class="progress-bar">
<div class="progress-fill" style="width:${p}%"></div>
</div>
</div>`;
});
localStorage.setItem("targets",JSON.stringify(targets));
}

// RENDER
function render(){
let income=0,expense=0;
list.innerHTML="";
data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

list.innerHTML+=`
<div class="item">
<div>${d.desc}</div>
<div style="color:${d.type=="income"?"#22c55e":"#ef4444"}">
${d.type=="income"?"+":"-"} ${rp(d.amount)}
</div>
</div>`;
});

balance.innerText=rp(income-expense);
localStorage.setItem("data",JSON.stringify(data));
}

// INIT
render();
renderTargets();

</script>

</body>
</html>
