<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:white}

/* CARD */
.card{
margin:12px;
padding:15px;
border-radius:16px;
background:rgba(255,255,255,0.05);
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
}

/* NAV */
.nav{
position:fixed;
bottom:0;width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}
.nav div{opacity:0.5}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:12px;
margin-top:8px;
background:#0f172a;
border-radius:10px;
}

/* TARGET */
.target-box{
background:#0f172a;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.progress-bar{
height:6px;
background:#1e293b;
border-radius:10px;
margin-top:6px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:#22c55e;
}

/* SUMMARY */
.summary{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}
.summary div{
background:#0f172a;
padding:10px;
border-radius:10px;
width:32%;
text-align:center;
font-size:12px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" type="number" placeholder="Nominal">

<button onclick="addData()">Simpan</button>
</div>
</div>

<!-- TARGET -->
<div id="targetTab" class="tab">
<div class="card">
<h3>🎯 Target Tabungan</h3>

<div id="targetList"></div>

<button onclick="addTarget()">+ Tambah Target</button>
</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card">

<div class="summary">
<div id="sumIncome">Rp0<br>Masuk</div>
<div id="sumExpense">Rp0<br>Keluar</div>
<div id="sumTotal">Rp0<br>Saldo</div>
</div>

<div id="list"></div>

</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="switchTab('home',this)">🏠</div>
<div onclick="switchTab('targetTab',this)">🎯</div>
<div onclick="switchTab('listTab',this)">📋</div>
</div>

<script>

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[];
let targets=JSON.parse(localStorage.getItem("targets"))||[];

// FORMAT
function rp(x){return "Rp"+(x||0).toLocaleString("id-ID");}

// TAB
function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

// RENDER
function render(){

let income=0,expense=0;
list.innerHTML="";

data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

let el=document.createElement("div");
el.className="item";
el.innerHTML=
"<div>"+d.desc+"</div>"+
"<div style='color:"+(d.type=="income"?"#22c55e":"#ef4444")+"'>"+
(d.type=="income"?"+":"-")+" "+rp(d.amount)+"</div>";

list.appendChild(el);
});

sumIncome.innerHTML=rp(income)+"<br>Masuk";
sumExpense.innerHTML=rp(expense)+"<br>Keluar";
sumTotal.innerHTML=rp(income-expense)+"<br>Saldo";

// chart
if(window.chart) chart.destroy();
window.chart=new Chart(chart,{
type:"bar",
data:{
labels:["Masuk","Keluar"],
datasets:[{
data:[income,expense],
backgroundColor:["#22c55e","#ef4444"]
}]
},
options:{plugins:{legend:{display:false}}}
});

localStorage.setItem("data",JSON.stringify(data));
}

// ADD DATA
function addData(){
let d={
type:type.value,
desc:desc.value,
amount:parseInt(amount.value)
};
if(!d.desc||!d.amount)return alert("Isi dulu!");
data.push(d);
desc.value="";amount.value="";
render();
}

// TARGET =================

function addTarget(){
let name=prompt("Nama target:");
let amount=prompt("Target uang:");
if(!name||!amount)return;

targets.push({
name:name,
target:parseInt(amount),
current:0
});

saveTargets();
renderTargets();
}

function addMoney(i){
let val=prompt("Tambah uang:");
if(!val)return;

targets[i].current+=parseInt(val);

saveTargets();
renderTargets();
}

function saveTargets(){
localStorage.setItem("targets",JSON.stringify(targets));
}

function renderTargets(){
targetList.innerHTML="";

targets.forEach((t,i)=>{
let percent=Math.min((t.current/t.target)*100,100);

let el=document.createElement("div");
el.className="target-box";
el.innerHTML=`
<div style="display:flex;justify-content:space-between">
<b>${t.name}</b>
<span onclick="event.stopPropagation();addMoney(${i})" style="color:#22c55e;font-size:18px">+</span>
</div>

<small>${rp(t.current)} / ${rp(t.target)} (${Math.floor(percent)}%)</small>

<div class="progress-bar">
<div class="progress-fill" style="width:${percent}%"></div>
</div>
`;

targetList.appendChild(el);
});
}

// INIT
render();
renderTargets();

</script>

</body>
</html>
