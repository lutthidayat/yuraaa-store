<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:sans-serif;
}

/* LAYOUT */
.wrapper{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:12px;
}

/* DESKTOP */
@media(min-width:900px){
  .wrapper{
    grid-template-columns:350px 1fr;
  }
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f172a,#020617);
  border-radius:18px;
  padding:16px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* BALANCE */
.balance{
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:black;
  font-size:26px;
}

/* KPI */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.kpi small{color:#94a3b8}

/* TOP */
.topItem{
  margin-top:10px;
}
.bar{
  height:6px;
  background:#1e293b;
  border-radius:10px;
}
.fill{
  height:100%;
  background:#22c55e;
  border-radius:10px;
}

/* CHART */
canvas{max-height:260px}
</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div>

<div class="card balance" id="balance">Rp 0</div>

<div class="grid">
<div class="card"><small>Omzet</small><h3 id="omzet">0</h3></div>
<div class="card"><small>Modal</small><h3 id="modal">0</h3></div>
<div class="card"><small>Profit</small><h3 id="profit">0</h3></div>
<div class="card"><small>ROI</small><h3 id="roi">0%</h3></div>
</div>

<div class="card" id="insight">🔥 Insight loading...</div>

<div class="card">
<h3>🏆 Top Game</h3>
<div id="topList"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<h3>📊 Omzet per Game</h3>
<canvas id="pie"></canvas>
</div>

<div class="card">
<h3>📈 Tren Profit</h3>
<canvas id="line"></canvas>
</div>

</div>

</div>

<script>

function rp(x){return "Rp "+(x||0).toLocaleString("id-ID")}
function num(v){return parseInt((v||"").replace(/\D/g,''))||0}

async function load(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let omzet=0,modal=0,profit=0
let map={}, daily={}

sheet.forEach(a=>{
if((a.Status||"").toLowerCase()!=="sold") return

let h=num(a.Harga)
let m=num(a.Modal)

omzet+=h
modal+=m
profit+=(h-m)

let game=a.Game||"Lainnya"
map[game]=(map[game]||0)+h

let d=new Date().toLocaleDateString()
daily[d]=(daily[d]||0)+(h-m)
})

balance.innerText=rp(omzet)
omzet.innerText=rp(omzet)
modal.innerText=rp(modal)
profit.innerText=rp(profit)
roi.innerText=modal?((profit/modal)*100).toFixed(1)+"%":"0%"

/* SORT */
let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1])

/* PIE */
new Chart(pie,{
type:'doughnut',
data:{
labels:sorted.map(x=>x[0]),
datasets:[{
data:sorted.map(x=>x[1]),
backgroundColor:[
"#22c55e","#38bdf8","#f59e0b",
"#ef4444","#a78bfa","#14b8a6"
]
}]
},
options:{
cutout:"70%",
plugins:{
legend:{position:'right'},
tooltip:{
callbacks:{
label:(c)=>c.label+": "+rp(c.raw)
}
}
}
}
})

/* TOP */
let html=""
sorted.forEach(g=>{
let p=(g[1]/omzet*100).toFixed(1)
html+=`
<div class="topItem">
<b>${g[0]}</b> ${rp(g[1])}
<div class="bar"><div class="fill" style="width:${p}%"></div></div>
</div>`
})
topList.innerHTML=html

/* LINE */
new Chart(line,{
type:'line',
data:{
labels:Object.keys(daily),
datasets:[{
label:"Profit",
data:Object.values(daily),
tension:0.4,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,0.1)",
fill:true
}]
},
options:{
plugins:{legend:{display:false}}
}
})

/* INSIGHT */
let top=sorted[0]?.[0]||"-"
let val=sorted[0]?.[1]||0

insight.innerHTML=`🔥 Game paling cuan: <b>${top}</b><br>${rp(val)}`

}

load()

</script>

</body>
</html>
