<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

/* ===== HEADER ===== */
.finance-wrap{padding:20px;}

.finance-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.finance-head h2 span{color:#8b5cf6;}

.trusted-badge{
  background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.3);
  padding:10px 16px;
  border-radius:14px;
}

/* ===== CARD ===== */
.f-card{
  position:relative;
  display:flex;
  gap:16px;
  padding:20px;
  border-radius:24px;
  background:rgba(15,23,42,.6);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(18px);
  margin-bottom:16px;
}

.f-icon{
  width:60px;height:60px;
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}

.purple .f-icon{background:#6d28d9;}
.green .f-icon{background:#065f46;}

.f-label{font-size:12px;color:#94a3b8;}
.f-value{font-size:30px;font-weight:900;}
.f-sub{color:#34d399;}
.f-growth{font-size:13px;margin-top:6px;}
.up{color:#22c55e;}
.down{color:#ef4444;}

/* ===== HISTORY ===== */
.history-box{
  margin-top:20px;
  background:rgba(15,23,42,.6);
  border-radius:24px;
  padding:16px;
}

.history-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:14px;
  opacity:0;
  transform:translateY(10px);
  transition:.3s;
}

.history-item.show{
  opacity:1;
  transform:translateY(0);
}

.history-left{
  display:flex;
  gap:12px;
  align-items:center;
}

.history-icon{
  width:45px;height:45px;
  border-radius:12px;
  background:#1e293b;
  display:flex;align-items:center;justify-content:center;
}

.history-price{
  color:#22c55e;
  font-weight:900;
}
</style>
</head>

<body>

<div class="finance-wrap">

  <div class="finance-head">
    <div>
      <h2><span>Yuraaa</span> Finance</h2>
      <p>Ringkasan keuangan & riwayat transaksi</p>
    </div>
    <div class="trusted-badge">✔ Trusted</div>
  </div>

  <!-- TOTAL MASUK -->
  <div class="f-card purple">
    <div class="f-icon">⬇</div>
    <div>
      <div class="f-label">TOTAL MASUK</div>
      <div class="f-value" id="totalMasuk">Rp 0</div>
      <div class="f-sub">Pemasukan</div>
      <div class="f-growth up" id="growthMasuk">+0%</div>
    </div>
  </div>

  <!-- RIWAYAT -->
  <div class="history-box">
    <h3>Riwayat Transaksi</h3>
    <div id="historyList"></div>
  </div>

</div>

<script>
// ================= API =================
const API = "https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List";

// ================= ANIMATION NUMBER =================
function animateNumber(el, target){
  let current = 0;
  const step = target / 40;

  const int = setInterval(()=>{
    current += step;
    if(current >= target){
      current = target;
      clearInterval(int);
    }
    el.textContent = "Rp " + Math.floor(current).toLocaleString("id-ID");
  },20);
}

// ================= STATUS FIX =================
function fixStatus(v){
  return (v||"").toLowerCase().replace(/[^a-z]/g,'');
}

// ================= RENDER =================
function render(data){

  // ambil SOLD
  const sold = data.filter(x => fixStatus(x.Status) === "sold");

  // total
  const total = sold.reduce((s,x)=>
    s + Number((x.Harga||"").replace(/[^\d]/g,'')),0
  );

  animateNumber(document.getElementById("totalMasuk"), total);

  document.getElementById("growthMasuk").textContent =
    "+" + (sold.length * 3) + "% dari bulan lalu";

  const list = document.getElementById("historyList");

  list.innerHTML = sold.map((x,i)=>`
    <div class="history-item" style="transition-delay:${i*0.05}s">
      <div class="history-left">
        <div class="history-icon">🎮</div>
        <div>
          <div>${x.Nama}</div>
          <div style="font-size:12px;color:#94a3b8">${x.Game}</div>
        </div>
      </div>
      <div class="history-price">
        Rp ${Number((x.Harga||"").replace(/[^\d]/g,'')).toLocaleString("id-ID")}
      </div>
    </div>
  `).join("");

  // animasi masuk
  setTimeout(()=>{
    document.querySelectorAll(".history-item").forEach(el=>{
      el.classList.add("show");
    });
  },100);
}

// ================= INIT =================
fetch(API)
  .then(res=>res.json())
  .then(data=>render(data));
</script>

</body>
</html>
