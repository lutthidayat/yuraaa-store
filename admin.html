<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:white}

/* BACK */
.back{position:fixed;top:12px;left:12px;z-index:1000;}
.back button{
background:rgba(30,41,59,0.8);
backdrop-filter:blur(10px);
color:white;border:none;padding:6px 10px;
border-radius:8px;font-size:11px;
}

/* LOGIN */
#loginPage{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:#020617;z-index:9999;
}
.login-box{
background:#0f172a;padding:25px;border-radius:16px;
width:90%;max-width:300px;text-align:center;
}
.pin-input{
text-align:center;font-size:22px;letter-spacing:8px;
}

/* CARD */
.card{
margin:12px;padding:15px;border-radius:16px;
background:rgba(255,255,255,0.05);
position:relative;
}

/* LOGOUT (ONLY HOME) */
.logout{
position:absolute;
top:10px;
right:10px;
background:#1e293b;
padding:6px 10px;
border-radius:8px;
font-size:11px;
}

/* INPUT */
input,select{
width:100%;padding:12px;margin-top:10px;
border-radius:10px;border:none;
background:#020617;color:white;
}

/* BUTTON */
button{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:10px;
background:#22c55e;color:black;font-weight:bold;
}
.reset{background:#ef4444;color:white}

/* NAV */
.nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#020617;padding:10px;
}
.nav div{opacity:0.5}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* BALANCE */
.balance{
text-align:center;
font-size:28px;
color:#22c55e;
margin:20px 0;
}

/* LIST */
.item{
display:flex;justify-content:space-between;
padding:12px;margin-top:8px;
background:#0f172a;border-radius:10px;
}

/* SUMMARY */
.summary-box{
display:flex;gap:10px;margin:10px;
}
.summary-item{
flex:1;background:#0f172a;padding:12px;
border-radius:12px;text-align:center;font-size:12px;
}
.summary-item b{display:block;font-size:14px;margin-bottom:4px;}
.income{color:#22c55e;}
.expense{color:#ef4444;}
.balance-txt{color:#38bdf8;}

/* TARGET */
.target-box{
background:#0f172a;padding:12px;border-radius:12px;margin-top:10px;
}
.progress-bar{
height:6px;background:#1e293b;border-radius:10px;margin-top:6px;overflow:hidden;
}
.progress-fill{height:100%;background:#22c55e;}

/* MODAL */
#modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(6px);
display:none;align-items:center;justify-content:center;
}
.modal-box{
background:rgba(15,23,42,0.9);
padding:20px;border-radius:16px;
width:85%;max-width:320px;
}
</style>
</head>

<body>


<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 PIN</h2>
<input id="pin" type="password" placeholder="••••" class="pin-input">
<button onclick="login()">Masuk</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="tab active">

<div class="card">
<div class="logout" onclick="logout()">⎋</div>

<div class="balance" id="balance">Rp 0</div>

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp 0">

<button onclick="addData()">Simpan</button>
</div>
</div>

<!-- TARGET -->
<div id="targetTab" class="tab">
<div class="card">
<h3>🎯 Target Tabungan</h3>

<div id="targetList"></div>
<button onclick="openAddTarget()">+ Tambah Target</button>
</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">

<div class="summary-box">
<div class="summary-item income">
<b id="sumIncome">Rp 0</b>Masuk
</div>
<div class="summary-item expense">
<b id="sumExpense">Rp 0</b>Keluar
</div>
<div class="summary-item balance-txt">
<b id="sumBalance">Rp 0</b>Saldo
</div>
</div>

<div class="card">
<div id="list"></div>
<button class="reset" onclick="resetAll()">Reset Semua</button>
</div>
</div>

<div class="nav">
<div class="active" onclick="switchTab('home',this)">🏠</div>
<div onclick="switchTab('targetTab',this)">🎯</div>
<div onclick="switchTab('listTab',this)">📋</div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h3 id="modalTitle"></h3>

<input id="modalName" placeholder="Tujuan">
<input id="modalInput" placeholder="Rp 0">

<button id="confirmBtn">Simpan</button>
<button onclick="closeModal()" style="background:#1e293b;color:white">Batal</button>
</div>
</div>

<script>

const SHOP_URL="index.html";

function login(){
if(pin.value==="1234"){
loginPage.style.display="none";
}else{
window.location.href=SHOP_URL;
}
}

function goBack(){window.location.href=SHOP_URL;}
function logout(){loginPage.style.display="flex";}

// FORMAT
function formatRp(v){
v=v.replace(/[^0-9]/g,"");
return "Rp "+(v?parseInt(v).toLocaleString("id-ID"):"0");
}
function getNum(v){
return parseInt(v.replace(/[^0-9]/g,""))||0;
}
function rp(x){
return "Rp "+(x||0).toLocaleString("id-ID");
}

amount.oninput=()=>amount.value=formatRp(amount.value);
modalInput.oninput=()=>modalInput.value=formatRp(modalInput.value);

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[];
let targets=JSON.parse(localStorage.getItem("targets"))||[];

let mode=null,selectedIndex=null;

// TAB
function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

// MODAL
function openModal(title, withName=false){
modal.style.display="flex";
modalTitle.innerText=title;

modalInput.value="";
modalName.value="";

modalName.style.display = withName ? "block" : "none";
}

function closeModal(){modal.style.display="none";}

// RESET
function resetAll(){
mode="reset";
openModal("Reset semua data?");
modalName.style.display="none";
modalInput.style.display="none";
}

// CONFIRM
confirmBtn.onclick=function(){

if(mode==="reset"){
data=[];targets=[];
localStorage.clear();
render();renderTargets();
}

if(mode==="delete"){
targets.splice(selectedIndex,1);
renderTargets();
}

if(mode==="addTarget"){
targets.push({
name: modalName.value || "Target",
target:getNum(modalInput.value),
current:0
});
renderTargets();
}

if(mode==="addMoney"){
targets[selectedIndex].current+=getNum(modalInput.value);
renderTargets();
}

closeModal();
};

// TARGET
function openAddTarget(){
mode="addTarget";
openModal("Tambah Target", true);
}

function addMoney(i){
mode="addMoney";
selectedIndex=i;
openModal("Tambah uang");
modalName.style.display="none";
}

function deleteTarget(i){
mode="delete";
selectedIndex=i;
openModal("Hapus target?");
modalName.style.display="none";
modalInput.style.display="none";
}

// ADD DATA
function addData(){
if(!desc.value||!amount.value)return;
data.push({
type:type.value,
desc:desc.value,
amount:getNum(amount.value)
});
desc.value="";amount.value="";
render();
}

// RENDER TARGET
function renderTargets(){
targetList.innerHTML="";
targets.forEach((t,i)=>{
let p=Math.min((t.current/t.target)*100,100);

targetList.innerHTML+=`
<div class="target-box">
<div style="display:flex;justify-content:space-between">
<div>
<b>${t.name}</b>
<small>${rp(t.current)} / ${rp(t.target)}</small>
</div>

<div style="display:flex;gap:5px">
<button onclick="addMoney(${i})" style="background:#22c55e">+</button>
<button onclick="deleteTarget(${i})" style="background:#ef4444">×</button>
</div>
</div>

<div class="progress-bar">
<div class="progress-fill" style="width:${p}%"></div>
</div>
</div>
`;
});
localStorage.setItem("targets",JSON.stringify(targets));
}

// RENDER
function render(){
let income=0,expense=0;
list.innerHTML="";

data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

list.innerHTML+=`
<div class="item">
<div>${d.desc}</div>
<div style="color:${d.type=="income"?"#22c55e":"#ef4444"}">
${d.type=="income"?"+":"-"} ${rp(d.amount)}
</div>
</div>`;
});

sumIncome.innerText=rp(income);
sumExpense.innerText=rp(expense);
sumBalance.innerText=rp(income-expense);
balance.innerText=rp(income-expense);

localStorage.setItem("data",JSON.stringify(data));
}

// INIT
render();
renderTargets();

</script>

</body>
</html>
