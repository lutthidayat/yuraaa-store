<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  padding:10px;
}

/* GRID */
.container{
  display:grid;
  gap:10px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f172a,#020617);
  border-radius:16px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.05);
}

/* BALANCE */
.balance{
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:black;
  font-size:24px;
}

/* GRID 2 */
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* KPI */
.kpi h3{margin-top:5px}

/* TOP LIST */
.top{
  margin-top:8px;
}
.bar{
  height:6px;
  background:#1e293b;
  border-radius:10px;
  margin-top:3px;
}
.fill{
  height:100%;
  background:#22c55e;
  border-radius:10px;
}

/* TABLE */
.table{
  font-size:12px;
}
.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

<!-- BALANCE -->
<div class="card balance" id="balance">Rp 0</div>

<!-- KPI -->
<div class="grid2">
<div class="card kpi">Omzet<h3 id="omzet">0</h3></div>
<div class="card kpi">Modal<h3 id="modal">0</h3></div>
<div class="card kpi">Profit<h3 id="profit">0</h3></div>
<div class="card kpi">ROI<h3 id="roi">0%</h3></div>
</div>

<!-- PIE -->
<div class="card">
<h3>Omzet per Game</h3>
<canvas id="pie"></canvas>
</div>

<!-- TOP GAME -->
<div class="card">
<h3>Top Game</h3>
<div id="topList"></div>
</div>

<!-- LINE -->
<div class="card">
<h3>Tren Profit</h3>
<canvas id="line"></canvas>
</div>

</div>

<script>

function rp(x){return "Rp "+(x||0).toLocaleString("id-ID")}
function num(v){return parseInt((v||"").toString().replace(/\D/g,''))||0}

async function load(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let omzet=0,modal=0,profit=0
let map={}, daily={}

sheet.forEach(a=>{
if((a.Status||"").toLowerCase()!=="sold") return

let h=num(a.Harga)
let m=num(a.Modal)

omzet+=h
modal+=m
profit+=(h-m)

let game=a.Game||"Lainnya"
map[game]=(map[game]||0)+h

let d=new Date().toLocaleDateString()
daily[d]=(daily[d]||0)+(h-m)
})

balance.innerText=rp(omzet)
omzet.innerText=rp(omzet)
modal.innerText=rp(modal)
profit.innerText=rp(profit)
roi.innerText=modal?((profit/modal)*100).toFixed(1)+"%":"0%"

/* PIE */
let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1])

new Chart(pie,{
type:'doughnut',
data:{
labels:sorted.map(x=>x[0]),
datasets:[{
data:sorted.map(x=>x[1]),
backgroundColor:["#22c55e","#38bdf8","#f59e0b","#ef4444","#a78bfa"]
}]
},
options:{cutout:"65%"}
})

/* TOP */
let html=""
sorted.forEach(g=>{
let percent=(g[1]/omzet*100).toFixed(1)
html+=`
<div class="top">
${g[0]} - ${rp(g[1])}
<div class="bar"><div class="fill" style="width:${percent}%"></div></div>
</div>`
})
topList.innerHTML=html

/* LINE */
new Chart(line,{
type:'line',
data:{
labels:Object.keys(daily),
datasets:[{
label:"Profit",
data:Object.values(daily),
borderColor:"#22c55e",
tension:0.4
}]
}
})

}

load()

</script>

</body>
</html>
