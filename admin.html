<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuraaa Marketplace Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    :root{
      --bg:#050816;
      --bg2:#0a0f1f;
      --panel:#0b1122;
      --panel2:#111827;
      --line:rgba(148,163,184,.14);
      --line2:rgba(139,92,246,.22);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --muted2:#64748b;
      --accent:#8b5cf6;
      --accent2:#6d28d9;
      --green:#22c55e;
      --yellow:#fbbf24;
      --red:#ef4444;
      --blue:#3b82f6;
      --shadow:0 18px 50px rgba(2,6,23,.55);
      --radius:22px;
      --radius2:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 80% -10%, rgba(139,92,246,.16), transparent 45%),
        radial-gradient(900px 500px at 10% 0%, rgba(59,130,246,.09), transparent 45%),
        linear-gradient(180deg, #020617 0%, #050816 100%);
      overflow:auto;
      scrollbar-gutter:stable;
    }
    .hidden{display:none !important}
    .app{
      display:grid;
      grid-template-columns: 294px 1fr;
      min-height:100vh;
      height:auto;
    }

    /* Sidebar */
    .sidebar{
      background:linear-gradient(180deg, rgba(2,6,23,.96), rgba(5,8,22,.98));
      border-right:1px solid var(--line);
      padding:18px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:14px;
      min-width:0;
    }
    .brand{
      display:flex;align-items:center;gap:10px;
      font-weight:900;font-size:15px;letter-spacing:.4px;
      padding:4px 8px 0;color:#fff;
    }
    .brand span{color:var(--accent)}
    .profile-card,
    .contact-box{
      background:linear-gradient(180deg, rgba(15,23,42,.96), rgba(10,15,31,.94));
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px 16px 16px;
      box-shadow:var(--shadow);
    }
    .profile-card{
      display:flex;flex-direction:column;align-items:center;gap:12px;
      position:relative;overflow:hidden;
    }
    .profile-card::before{
      content:"";position:absolute;inset:-40% -20% auto;
      height:140px;
      background:radial-gradient(circle at 50% 50%, rgba(139,92,246,.18), transparent 65%);
      pointer-events:none;
    }
    .avatar-wrap{
      width:96px;height:96px;border-radius:999px;padding:3px;
      background:linear-gradient(145deg, rgba(139,92,246,.9), rgba(59,130,246,.45));
      box-shadow:0 12px 30px rgba(139,92,246,.22);
      position:relative;
    }
    .avatar{
      width:100%;height:100%;border-radius:999px;object-fit:cover;display:block;
      border:3px solid rgba(255,255,255,.07);
    }
    .verified{
      position:absolute;right:-4px;top:4px;width:28px;height:28px;border-radius:50%;
      background:#3b82f6;display:grid;place-items:center;border:3px solid #0f172a;
      box-shadow:0 10px 18px rgba(59,130,246,.25);font-size:16px;
    }
    .profile-name{font-size:18px;font-weight:800;line-height:1.1;text-align:center}
    .profile-sub{
      font-size:12px;color:#c4b5fd;background:rgba(124,58,237,.16);
      padding:7px 12px;border-radius:999px;border:1px solid rgba(124,58,237,.18)
    }
    .profile-meta{display:flex;align-items:center;gap:8px;color:#dbeafe;font-size:13px}
    .dot{width:9px;height:9px;border-radius:999px;background:#34d399;box-shadow:0 0 0 6px rgba(52,211,153,.12)}
    .side-section{padding-top:2px}
    .side-title{font-size:12px;color:var(--muted2);letter-spacing:.08em;margin:0 0 12px 2px}
    .side-nav{display:flex;flex-direction:column;gap:8px}
    .side-btn{
      appearance:none;border:1px solid transparent;width:100%;text-align:left;cursor:pointer;
      border-radius:16px;background:transparent;color:var(--text);padding:14px 14px;
      display:flex;align-items:center;gap:12px;font:inherit;transition:.18s ease
    }
    .side-btn:hover{background:rgba(15,23,42,.82);border-color:var(--line)}
    .side-btn.active{
      background:linear-gradient(180deg, rgba(124,58,237,.18), rgba(15,23,42,.92));
      border-color:rgba(124,58,237,.28);
      box-shadow:0 10px 24px rgba(139,92,246,.12) inset;
      color:#fff;
    }
    .side-icon{width:22px;height:22px;display:grid;place-items:center;flex:0 0 auto;color:#c4b5fd}
    .contact-box{margin-top:auto}
    .contact-box .small{font-size:12px;color:var(--muted);line-height:1.45}
    .socials{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .social-btn{
      text-decoration:none;color:#fff;font-weight:700;border-radius:14px;padding:13px 14px;
      display:flex;align-items:center;gap:10px;box-shadow:0 10px 18px rgba(0,0,0,.12)
    }
    .wa{background:linear-gradient(180deg, #1f8f55, #17693f)}
    .fb{background:linear-gradient(180deg, #2e67c8, #224b92)}

    /* Content */
    .content{min-width:0;display:flex;flex-direction:column;overflow:visible;position:relative}
    .topbar{
      height:74px;flex:0 0 auto;position:sticky;top:0;z-index:60;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 24px 0 30px;border-bottom:1px solid var(--line);
      background:rgba(5,8,22,.68);backdrop-filter: blur(16px);
    }
    .topbar-left{display:flex;align-items:center;gap:14px;min-width:0}
    .hamburger,.icon-btn,.close-btn{
      width:42px;height:42px;border-radius:14px;border:1px solid var(--line);
      background:rgba(15,23,42,.65);color:#e2e8f0;display:grid;place-items:center;cursor:pointer
    }
    .page-title{display:flex;flex-direction:column;gap:3px;min-width:0}
    .page-title h1{margin:0;font-size:24px;line-height:1.1;font-weight:900;letter-spacing:.2px}
    .page-title h1 span{color:var(--accent)}
    .page-title p{margin:0;font-size:13px;color:var(--muted)}
    .top-actions{display:flex;align-items:center;gap:10px}
    .icon-btn{position:relative}
    .icon-badge::after{
      content:"";position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;
      background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.15)
    }
    .main{
      flex:1 1 auto;overflow:visible;padding:22px 28px 28px;
      scrollbar-color: rgba(148,163,184,.5) transparent;
      scroll-behavior:smooth;
    }
    .main::-webkit-scrollbar{width:10px}
    .main::-webkit-scrollbar-thumb{background:rgba(148,163,184,.35);border-radius:999px;border:2px solid transparent;background-clip:padding-box}

    /* Tabs */
    .tabs{display:none !important;}
    .tab{
      background:none;border:none;color:var(--muted);font:inherit;font-weight:800;
      padding:0 0 12px;cursor:pointer;position:relative;font-size:15px;white-space:nowrap;flex:0 0 auto
    }
    .tab.active{color:#fff}
    .tab.active::after{
      content:"";position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:999px;
      background:linear-gradient(90deg, var(--accent), #c084fc);
      box-shadow:0 0 18px rgba(139,92,246,.5);
    }

    /* Custom dropdowns */
    .toolbar{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-bottom:16px;
      align-items:stretch;
    }
    .dd{
      position:relative;
      min-width:0;
    }
    .dd-btn{
      width:100%; height:56px;
      border-radius:18px;
      border:1px solid rgba(148,163,184,.16);
      background:linear-gradient(180deg, rgba(15,23,42,.88), rgba(10,15,31,.96));
      color:var(--text);
      padding:0 16px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
      transition:.18s ease;
      font:inherit;
    }
    .dd-btn:hover{border-color:rgba(139,92,246,.28);transform:translateY(-1px)}
    .dd-btn .left{
      min-width:0;display:flex;flex-direction:column;align-items:flex-start;gap:2px
    }
    .dd-btn .label{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .dd-btn .sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .dd-btn .caret{color:#cbd5e1;font-size:15px;transition:.18s ease}
    .dd.open .caret{transform:rotate(180deg)}
    .dd-menu{
      position:absolute;left:0;right:0;top:calc(100% + 10px);
      background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(10,15,31,.98));
      border:1px solid rgba(148,163,184,.16);
      border-radius:18px;
      padding:8px;
      box-shadow:0 24px 70px rgba(2,6,23,.6);
      z-index:30;
      display:none;
      max-height:min(380px, 48vh);
      overflow:auto;
    }
    .dd.open .dd-menu{display:block}
    .dd-menu::-webkit-scrollbar{width:10px}
    .dd-menu::-webkit-scrollbar-thumb{background:rgba(148,163,184,.24);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
    .dd-item{
      width:100%;
      border:none;
      background:transparent;
      color:var(--text);
      border-radius:14px;
      padding:14px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      cursor:pointer;
      text-align:left;
      transition:.15s ease;
    }
    .dd-item:hover{background:rgba(148,163,184,.08)}
    .dd-item.active{background:rgba(139,92,246,.16)}
    .dd-item + .dd-item{margin-top:4px}
    .dd-item .labelbox{min-width:0;display:flex;flex-direction:column;gap:3px}
    .dd-item .title{font-weight:800;font-size:14px;line-height:1.2}
    .dd-item .subtext{font-size:12px;color:var(--muted);line-height:1.35}
    .dd-radio{
      width:20px;height:20px;border-radius:50%;
      border:2px solid rgba(203,213,225,.8);
      flex:0 0 auto;
      position:relative;
    }
    .dd-item.active .dd-radio{
      border-color:#b7c5ff;
      box-shadow:0 0 0 5px rgba(129,140,248,.12) inset;
    }
    .dd-item.active .dd-radio::after{
      content:"";
      position:absolute;inset:4px;border-radius:50%;background:#c7d2fe;
    }

    .chip-row{
      display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px
    }
    .chip{
      border:1px solid var(--line);
      background:rgba(15,23,42,.72);
      color:#dbeafe;
      border-radius:14px;padding:10px 15px;
      display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-weight:700;
      transition:.18s ease;user-select:none
    }
    .chip:hover{transform:translateY(-1px);border-color:rgba(124,58,237,.28)}
    .chip.active{
      background:linear-gradient(180deg, rgba(139,92,246,.96), rgba(109,40,217,.96));
      border-color:rgba(167,139,250,.55);
      box-shadow:0 10px 30px rgba(139,92,246,.22);
      color:#fff;
    }
    .chip .dot-mini{width:10px;height:10px;border-radius:50%;background:#fff;opacity:.85}
    .chip.hot .dot-mini{background:#fb7185}
    .chip.new .dot-mini{background:#60a5fa}
    .chip.promo .dot-mini{background:#34d399}
    .chip.sold .dot-mini{background:#f87171}
    .chip.proses .dot-mini{background:#fbbf24}
    .chip.ready .dot-mini{background:#4ade80}

    /* List */
    .list{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;transition:opacity .28s ease, transform .28s ease}
    .card{
      background:linear-gradient(180deg, rgba(11,17,34,.96), rgba(8,13,28,.96));
      border:1px solid rgba(148,163,184,.12);
      border-radius:24px;
      padding:20px 16px 16px;
      display:grid;
      grid-template-columns: 210px 1fr 230px;
      gap:16px;
      position:relative;
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      will-change:transform;
      cursor:pointer;
      min-height:214px;
      animation:cardIn .28s ease both;
    }
    .card:hover{
      transform:translateY(-3px) scale(1.01);
      border-color:rgba(124,58,237,.32);
      box-shadow:0 20px 54px rgba(2,6,23,.68), 0 0 0 1px rgba(124,58,237,.08) inset;
    }
    .card:active{
      transform:translateY(0) scale(.97);
    }
    .card::before{
      content:"";position:absolute;inset:0;
      background:linear-gradient(90deg, rgba(124,58,237,.05), transparent 22%, transparent 78%, rgba(59,130,246,.05));
      pointer-events:none
    }
    .card-badge{display:none !important;}
    .b-hot{background:#ef4444;color:white}
    .b-new{background:#2563eb;color:white}
    .b-promo{background:#f59e0b;color:#111827}
    .b-none{display:none}

    .thumb{
      width:100%;height:182px;border-radius:20px;overflow:hidden;
      background:linear-gradient(180deg, rgba(148,163,184,.08), rgba(15,23,42,.1));
      border:1px solid rgba(148,163,184,.1);
      position:relative;flex:0 0 auto;
      padding:10px;
    }
    .thumb img{
      width:100%;height:100%;
      object-fit:contain;
      object-position:center center;
      background:
        radial-gradient(circle at 50% 30%, rgba(139,92,246,.15), transparent 42%),
        linear-gradient(180deg, rgba(15,23,42,.98), rgba(8,13,28,.98));
      display:block;
      box-sizing:border-box;
      filter:saturate(1.02) contrast(1.02);
      border-radius:14px;
    }
    .thumb-count{
      position:absolute;left:12px;bottom:12px;z-index:2;
      display:flex;align-items:center;gap:6px;
      background:rgba(2,6,23,.58);
      border:1px solid rgba(255,255,255,.08);
      padding:7px 10px;border-radius:999px;color:#fff;font-size:12px;backdrop-filter:blur(8px)
    }
    .card-main{min-width:0;display:flex;flex-direction:column;gap:10px;justify-content:flex-start}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;min-width:0}
    .title-wrap{min-width:0}
    .game-badge{
      display:inline-flex;align-items:center;gap:8px;border-radius:999px;
      background:rgba(16,24,40,.8);border:1px solid rgba(148,163,184,.14);
      padding:8px 12px;color:#dbeafe;font-size:12px;font-weight:800;text-transform:lowercase;
      white-space:nowrap;max-width:100%
    }
    .item-id{
      display:inline-flex;align-items:center;gap:8px;
      margin-top:6px;
      color:#c4b5fd;
      font-size:12px;
      font-weight:800;
      letter-spacing:.2px;
    }
    .price-id{
      display:inline-flex;align-items:center;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(15,23,42,.62);
      color:#cbd5e1;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .title{
      margin:0;font-size:21px;line-height:1.25;font-weight:900;
      letter-spacing:.1px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      white-space:normal;
      max-width:100%;
    }
    .meta-row{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:12px
    }
    .pill{
      display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:7px 11px;
      font-size:12px;font-weight:700;border:1px solid var(--line);background:rgba(15,23,42,.74);color:#dbeafe
    }
    .price-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
    .price{color:#34d399;font-size:22px;font-weight:900;letter-spacing:.1px}
    .old-price{color:#94a3b8;text-decoration:line-through;font-size:13px}
    .disc-pill{
      display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;
      background:rgba(239,68,68,.14);color:#fca5a5;font-size:12px;font-weight:800;border:1px solid rgba(239,68,68,.2)
    }
    .desc{
      color:#cbd5e1;font-size:13px;line-height:1.6;max-width:860px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .badge-row{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:auto
    }
    .status-pill{
      display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:8px 12px;
      font-size:12px;font-weight:800;text-transform:capitalize;color:#fff;letter-spacing:.2px;
      white-space:nowrap;
    }
    .status-ready{background:rgba(34,197,94,.16);border:1px solid rgba(34,197,94,.25);color:#86efac}
    .status-proses{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.22);color:#fcd34d}
    .status-sold{background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.22);color:#fca5a5}
    .status-dot{width:8px;height:8px;border-radius:50%}
    .status-ready .status-dot{background:#22c55e}
    .status-proses .status-dot{background:#fbbf24}
    .status-sold .status-dot{background:#ef4444}
    .contact-chip{
      display:inline-flex;align-items:center;border-radius:999px;padding:8px 12px;
      font-size:12px;font-weight:800;border:1px solid rgba(148,163,184,.16);background:rgba(15,23,42,.5);
      color:#dbeafe;white-space:nowrap;
    }
    .contact-chip.locked{color:#fda4af;border-color:rgba(248,113,113,.2);background:rgba(239,68,68,.1)}

    .notif-modal{
      position:fixed;
      inset:0;
      z-index:95;
      background:rgba(2,6,23,.78);
      backdrop-filter:blur(18px);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:16px;
    }
    .notif-panel{
      width:min(760px, 100%);
      margin-top:62px;
      border-radius:28px;
      border:1px solid rgba(167,139,250,.22);
      background:linear-gradient(180deg, rgba(10,15,30,.99), rgba(6,10,22,.99));
      box-shadow:
        0 30px 90px rgba(0,0,0,.56),
        0 0 0 1px rgba(139,92,246,.06) inset,
        0 0 0 1px rgba(167,139,250,.08);
      padding:18px;
      max-height:min(82vh, 820px);
      overflow:auto;
    }
    .notif-panel::-webkit-scrollbar{width:10px}
    .notif-panel::-webkit-scrollbar-thumb{background:rgba(148,163,184,.22);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
    .notif-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }
    .notif-head h3{
      margin:0;
      font-size:24px;
      line-height:1.1;
      font-weight:900;
      letter-spacing:-.02em;
    }
    .notif-head p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }
    .notif-head-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
    }
    .notif-mark{
      height:42px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(15,23,42,.72);
      color:#dbeafe;
      padding:0 14px;
      font:inherit;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
    }
    .notif-mark:hover{
      background:rgba(139,92,246,.14);
      border-color:rgba(167,139,250,.26);
    }
    .notif-stats{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
      margin-bottom:18px;
    }
    .notif-stat{
      border-radius:20px;
      border:1px solid rgba(148,163,184,.12);
      background:linear-gradient(180deg, rgba(15,23,42,.88), rgba(10,15,30,.98));
      padding:14px 14px 16px;
      box-shadow:0 12px 30px rgba(0,0,0,.18);
    }
    .notif-stat .n-label{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700}
    .notif-stat .n-value{font-size:26px;font-weight:900;color:#fff;line-height:1}
    .notif-stat .n-sub{margin-top:8px;color:#cbd5e1;font-size:12px;line-height:1.4}
    .notif-list{display:flex;flex-direction:column;gap:16px}
    .notif-group{
      border-radius:22px;
      border:1px solid rgba(148,163,184,.12);
      background:rgba(10,15,30,.75);
      padding:16px;
    }
    .notif-group-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bot
