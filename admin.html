<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:sans-serif;
}

/* LOGIN */
.login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}
.login input{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
background:#0f172a;
color:white;
text-align:center;
}
.login button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
}

/* APP */
.app{display:none}

/* NAV GLASS */
.nav{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
display:flex;
justify-content:space-around;

background:rgba(15,23,42,0.4);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

padding:10px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.05);
}
.nav div{
opacity:.6;
transition:.2s;
}
.nav .active{
opacity:1;
color:#22c55e;
transform:scale(1.1);
}

/* TAB */
.tab{
display:none;
padding:14px;
padding-bottom:90px;
}
.tab.active{display:block}

/* CARD */
.card{
background:#0f172a;
border-radius:14px;
padding:16px;
margin-top:12px;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#020617;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
}
.green{background:#22c55e;color:black}
.red{background:#ef4444;color:white}
.gray{background:#334155;color:white}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:12px;
margin-top:8px;
background:#020617;
border-radius:10px;
}

/* TOTAL */
.total{
display:flex;
justify-content:space-between;
}

/* CHART */
canvas{
width:100%!important;
height:240px!important;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>🔐 Masukkan PIN</h2>
<input id="pinInput" type="password" placeholder="PIN">
<button onclick="checkPin()">Masuk</button>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="card">💰 Yuraaa Finance</div>

<!-- TAB 1 -->
<div id="home" class="tab active">
<div class="card">

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp" oninput="formatRp(this)">

<button class="green" onclick="addData()">Simpan</button>
<button class="red" onclick="resetData()">Reset</button>
<button class="gray" onclick="logout()">Logout</button>

</div>
</div>

<!-- TAB 2 -->
<div id="dashboard" class="tab">

<div class="card">
<h3>📊 Grafik Penjualan</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>🛒 Akun Sold</h3>
<div id="soldList">Loading...</div>
</div>

</div>

<!-- TAB 3 -->
<div id="history" class="tab">

<div class="card total">
<div>Masuk: <b id="income">0</b></div>
<div>Keluar: <b id="expense">0</b></div>
</div>

<div class="card">
<h3>📋 Riwayat</h3>
<div id="list"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="tab('home',this)">🏠</div>
<div onclick="tab('dashboard',this)">📊</div>
<div onclick="tab('history',this)">📋</div>
</div>

</div>

<script>

// PIN
const PIN="1234"

function checkPin(){
if(pinInput.value===PIN){
loginPage.style.display="none"
app.style.display="block"
}else{
alert("PIN salah")
}
}

function logout(){
app.style.display="none"
loginPage.style.display="flex"
pinInput.value=""
}

// HELPER
function rp(x){return "Rp "+(x||0).toLocaleString("id-ID")}
function num(v){return parseInt((v||"").replace(/\D/g,''))||0}

// FORMAT RP
function formatRp(el){
let val=el.value.replace(/\D/g,'')
el.value=val?"Rp "+parseInt(val).toLocaleString("id-ID"):""
}

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[]

// TAB
function tab(id,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'))
el.classList.add('active')
}

// ADD
function addData(){
if(!desc.value||!amount.value)return

data.push({
type:type.value,
desc:desc.value,
amount:num(amount.value)
})

desc.value=""
amount.value=""

render()
}

// RESET
function resetData(){
if(confirm("Hapus semua data?")){
data=[]
localStorage.removeItem("data")
render()
}
}

// RENDER
function render(){
let inc=0,exp=0
list.innerHTML=""

data.forEach(d=>{
if(d.type==="income") inc+=d.amount
else exp+=d.amount

list.innerHTML+=`
<div class="item">
<div>${d.desc}</div>
<div style="color:${d.type==="income"?"#22c55e":"#ef4444"}">
${rp(d.amount)}
</div>
</div>`
})

income.innerText=rp(inc)
expense.innerText=rp(exp)

localStorage.setItem("data",JSON.stringify(data))
}

// DASHBOARD
async function loadDashboard(){

try{
const url="https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List"
const res=await fetch(url)
const sheet=await res.json()

let map={}
let html=""

sheet.forEach(r=>{
if((r.Status||"").toLowerCase()!=="sold") return

let game=r.Game||"Lainnya"
let harga=num(r.Harga)
let nama=r.Nama||"Akun"

map[game]=(map[game]||0)+harga

html+=`
<div class="item">
<div>${nama}</div>
<div>${rp(harga)}</div>
</div>`
})

soldList.innerHTML=html||"<small>Belum ada data</small>"

let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1])

const ctx=document.getElementById("chart").getContext("2d")
if(window.chart) chart.destroy()

window.chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:sorted.map(x=>x[0]),
datasets:[{
data:sorted.map(x=>x[1]),
backgroundColor:["#22c55e","#38bdf8","#f59e0b","#ef4444","#a78bfa"]
}]
},
options:{plugins:{legend:{display:false}}}
})

}catch(e){
soldList.innerHTML="Gagal load data"
}
}

// INIT
render()
loadDashboard()
setInterval(loadDashboard,10000)

</script>

</body>
</html>
