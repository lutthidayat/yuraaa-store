<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Finance Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:white}

/* HEADER */
.header{padding:20px}
.header small{color:#94a3b8}

/* BALANCE */
.balance-card{
 margin:0 16px;
 padding:20px;
 border-radius:20px;
 background:linear-gradient(135deg,#22c55e,#4ade80);
 color:black;
}

/* CARD */
.card{
 margin:12px;
 padding:14px;
 border-radius:16px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
}

/* INPUT */
input,select{
 width:100%;padding:10px;margin-top:6px;
 border-radius:10px;border:none;
 background:#020617;color:white;
}

/* BUTTON */
button{
 width:100%;padding:10px;margin-top:8px;
 border:none;border-radius:10px;
 font-weight:bold;
}
.primary{background:#22c55e;color:black}

/* LIST */
.item{
 display:flex;justify-content:space-between;
 padding:10px;margin-top:6px;
 background:#0f172a;border-radius:10px;
}
.item small{color:#94a3b8}

/* NAV */
.nav{
 position:fixed;bottom:10px;left:50%;
 transform:translateX(-50%);
 width:95%;display:flex;justify-content:space-around;
 background:#0f172a;padding:10px;border-radius:20px;
}
.nav div{font-size:12px;opacity:0.5;text-align:center}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* KPI */
.kpi-grid{
 display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
}
.kpi{
 padding:12px;border-radius:12px;
 background:rgba(255,255,255,0.05);
}
.kpi p{font-size:12px;color:#94a3b8}

/* GRID */
.grid2{
 display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
</style>
</head>

<body>

<div class="header">
<h2>Yuraaa Finance</h2>
<small>Dashboard Bisnis & Keuangan</small>
</div>

<div class="balance-card">
<h2 id="balance">Rp 0</h2>
</div>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">

<select id="type">
<option value="income">+ Pemasukan</option>
<option value="expense">- Pengeluaran</option>
</select>

<select id="category">
<option>Jual Akun</option>
<option>Makanan</option>
<option>Top Up</option>
<option>Lainnya</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp 0">

<button class="primary" onclick="addData()">Simpan</button>
<button onclick="syncSheet()">🔄 Sync Sold</button>

</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card"><div id="list"></div></div>
</div>

<!-- ANALYTICS -->
<div id="analyticsTab" class="tab">
<div class="card"><canvas id="pie"></canvas></div>
<div class="card"><canvas id="bar"></canvas></div>
<div class="card"><canvas id="line"></canvas></div>
</div>

<!-- BUSINESS -->
<div id="businessTab" class="tab">

<div class="kpi-grid">
<div class="kpi"><p>Omzet</p><h3 id="omzet">0</h3></div>
<div class="kpi"><p>Modal</p><h3 id="modal">0</h3></div>
<div class="kpi"><p>Profit</p><h3 id="profit">0</h3></div>
<div class="kpi"><p>ROI</p><h3 id="roi">0%</h3></div>
</div>

<div class="card"><canvas id="profitChart"></canvas></div>

<div class="grid2">
<div class="card"><canvas id="gameChart"></canvas></div>
<div class="card"><p id="insight"></p></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="tab('home',this)">🏠</div>
<div onclick="tab('listTab',this)">📋</div>
<div onclick="tab('analyticsTab',this)">📊</div>
<div onclick="tab('businessTab',this)">💰</div>
</div>

<script>

// FORMAT
function rp(x){return "Rp "+(x||0).toLocaleString("id-ID")}
function num(v){return parseInt(v.replace(/\D/g,''))||0}
amount.oninput=()=>amount.value=rp(num(amount.value))

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[]

// TAB
function tab(id,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'))
el.classList.add('active')
}

// ADD
function addData(){
if(!desc.value||!amount.value)return
data.push({
id:Date.now(),
type:type.value,
desc:desc.value,
amount:num(amount.value),
category:category.value,
date:new Date().toLocaleDateString("id-ID")
})
desc.value="";amount.value=""
render()
}

// DELETE
function del(id){
data=data.filter(d=>d.id!==id)
render()
}

// SYNC GOOGLE SHEET
async function syncSheet(){
const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

sheet.filter(a=>a.Status?.toLowerCase()=="sold")
.forEach(a=>{
let amount=num(a.Harga||"0")
if(data.find(d=>d.desc==a.Nama))return
data.push({
id:Date.now()+Math.random(),
type:"income",
desc:a.Nama,
amount:amount,
category:"Jual Akun",
date:new Date().toLocaleDateString("id-ID")
})
})

render()
}

// RENDER
function render(){

let income=0,expense=0
list.innerHTML=""

data.forEach(d=>{
if(d.type=="income") income+=d.amount
else expense+=d.amount

list.innerHTML+=`
<div class="item">
<div>
<b>${d.desc}</b><br>
<small>${d.category} • ${d.date}</small>
</div>
<div>
${d.type=="income"?"+":"-"} ${rp(d.amount)}
<button onclick="del(${d.id})">🗑</button>
</div>
</div>`
})

balance.innerText=rp(income-expense)

// SAVE
localStorage.setItem("data",JSON.stringify(data))

analytics()
business()
}

// ANALYTICS
function analytics(){

let cat={},daily={},income=0,expense=0

data.forEach(d=>{
if(d.type=="expense"){
cat[d.category]=(cat[d.category]||0)+d.amount
expense+=d.amount
}else income+=d.amount

daily[d.date]=(daily[d.date]||0)+(d.type=="income"?d.amount:-d.amount)
})

if(window.pieChart) pieChart.destroy()
if(window.barChart) barChart.destroy()
if(window.lineChart) lineChart.destroy()

window.pieChart=new Chart(pie,{type:'pie',data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}})
window.barChart=new Chart(bar,{type:'bar',data:{labels:["Income","Expense"],datasets:[{data:[income,expense]}]}})
window.lineChart=new Chart(line,{type:'line',data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily)}]}})
}

// BUSINESS
async function business(){

const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List")
const sheet=await res.json()

let omzet=0,modal=0,profit=0,game={},daily={}

sheet.filter(a=>a.Status?.toLowerCase()=="sold")
.forEach(a=>{
let h=num(a.Harga||"0")
let m=num(a.Modal||"0")

omzet+=h
modal+=m
profit+=(h-m)

game[a.Game]=(game[a.Game]||0)+1
let d=new Date().toLocaleDateString("id-ID")
daily[d]=(daily[d]||0)+(h-m)
})

omzetEl=omzet
modalEl=modal
profitEl=profit

omzet.innerText=rp(omzet)
modal.innerText=rp(modal)
profit.innerText=rp(profit)

let roiVal=modal?((profit/modal)*100).toFixed(1):0
roi.innerText=roiVal+"%"

insight.innerText=`🔥 Terlaris: ${Object.keys(game)[0]||'-'}`

if(window.gc) gc.destroy()
if(window.pc) pc.destroy()

window.gc=new Chart(gameChart,{type:'bar',data:{labels:Object.keys(game),datasets:[{data:Object.values(game)}]}})
window.pc=new Chart(profitChart,{type:'line',data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily)}]}})

}

// INIT
render()

</script>

</body>
</html>
