<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

/* LOGIN */
#loginPage{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:#020617;z-index:9999;
}

.login-box{
background:rgba(255,255,255,0.05);
padding:25px;border-radius:16px;
width:90%;max-width:300px;
text-align:center;
}

/* BALANCE */
.balance{
text-align:center;
font-size:32px;
margin:15px 0;
color:#22c55e;
text-shadow:0 0 20px #22c55e;
}

/* CARD */
.card{
margin:12px;
padding:15px;
border-radius:16px;
background:rgba(255,255,255,0.05);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
}
button:active{transform:scale(0.95)}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
position:fixed;
bottom:0;width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav div{opacity:0.5}
.nav .active{opacity:1;color:#22c55e}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:10px;
margin-top:8px;
background:#0f172a;
border-radius:8px;
}

/* FILTER */
.filter{
display:flex;gap:8px;margin-top:10px;
}
.filter button{flex:1;background:#1e293b}
.filter .active{background:#22c55e;color:black}

/* PROGRESS BAR MINI */
.bar{
height:6px;
background:#1e293b;
border-radius:10px;
margin-top:5px;
overflow:hidden;
}
.bar-fill{
height:100%;
background:#22c55e;
}

/* ANIMATION */
.fade{
animation:fade 0.3s ease;
}
@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 Admin</h2>
<input id="passwordInput" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
<p id="error" style="color:red;display:none">Salah</p>
</div>
</div>

<!-- BALANCE -->
<div class="balance" id="balance">Rp0</div>

<!-- HOME -->
<div id="home" class="tab active">

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" type="number" placeholder="Nominal">

<button onclick="addData()">Simpan</button>
</div>

</div>

<!-- TARGET (MULTI) -->
<div id="targetTab" class="tab">
<div class="card">
<h3>🎯 Target Tabungan</h3>

<div id="targetList"></div>

<button onclick="addTarget()">+ Tambah Target</button>
</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card">
<h3>📋 Riwayat</h3>

<div class="filter">
<button onclick="setFilter('all',this)" class="active">Semua</button>
<button onclick="setFilter('income',this)">Masuk</button>
<button onclick="setFilter('expense',this)">Keluar</button>
</div>

<div id="list"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="switchTab('home',this)">🏠</div>
<div onclick="switchTab('targetTab',this)">🎯</div>
<div onclick="switchTab('listTab',this)">📋</div>
</div>

<script>

// LOGIN
function login(){
if(passwordInput.value==="123"){
loginPage.style.display="none";
}else error.style.display="block";
}

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[];
let targets=JSON.parse(localStorage.getItem("targets"))||[];
let filter="all";

// TAB
function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
let tab=document.getElementById(id);
tab.classList.add("active","fade");

document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

// FILTER
function setFilter(f,el){
filter=f;
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

// FORMAT
function rp(x){return "Rp"+(x||0).toLocaleString("id-ID");}

// ANIMASI ANGKA
function animateValue(el,start,end){
let current=0;
let step=end/30;
let interval=setInterval(()=>{
current+=step;
if(current>=end){
current=end;
clearInterval(interval);
}
el.innerText=rp(Math.floor(current));
},10);
}

// RENDER
function render(){
list.innerHTML="";
let income=0,expense=0;

data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

if(filter==="all"||filter===d.type){
let el=document.createElement("div");
el.className="item";
el.innerHTML=
"<div>"+d.desc+"</div>"+
"<div style='color:"+(d.type=="income"?"#22c55e":"#ef4444")+"'>"+
(d.type=="income"?"+":"-")+" "+rp(d.amount)+"</div>";
list.appendChild(el);
}
});

let total=income-expense;
animateValue(balance,0,total);

// chart
if(window.chart) chart.destroy();
window.chart=new Chart(chart,{
type:"bar",
data:{
labels:["Masuk","Keluar"],
datasets:[{
data:[income,expense],
backgroundColor:["#22c55e","#ef4444"]
}]
},
options:{plugins:{legend:{display:false}}}
});

// SAVE
localStorage.setItem("data",JSON.stringify(data));
}

// ADD DATA
function addData(){
let d={
type:type.value,
desc:desc.value,
amount:parseInt(amount.value)
};
if(!d.desc||!d.amount)return alert("Isi dulu!");
data.push(d);
desc.value="";amount.value="";
render();
}

// ================= TARGET =================

// ADD TARGET
function addTarget(){
let name=prompt("Nama target:");
let amount=prompt("Target uang:");
if(!name||!amount)return;

targets.push({
name:name,
target:parseInt(amount),
current:0
});

saveTargets();
renderTargets();
}

// ADD MONEY
function addMoney(i){
let val=prompt("Tambah uang:");
if(!val)return;

targets[i].current+=parseInt(val);

saveTargets();
renderTargets();
}

// SAVE
function saveTargets(){
localStorage.setItem("targets",JSON.stringify(targets));
}

// RENDER TARGET
function renderTargets(){
targetList.innerHTML="";

targets.forEach((t,i)=>{
let percent=Math.min((t.current/t.target)*100,100);

let el=document.createElement("div");
el.className="item";
el.innerHTML=`
<div>
<b>${t.name}</b><br>
<small>${rp(t.current)} / ${rp(t.target)} (${Math.floor(percent)}%)</small>
<div class="bar"><div class="bar-fill" style="width:${percent}%"></div></div>
</div>
<div style="color:#22c55e">+</div>
`;

el.onclick=()=>addMoney(i);

targetList.appendChild(el);
});
}

// INIT
render();
renderTargets();

</script>

</body>
</html>
