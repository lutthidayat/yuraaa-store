<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa HUD</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

/* LOGIN */
#loginPage{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:#020617;z-index:9999;
}

.login-box{
background:rgba(255,255,255,0.05);
padding:25px;border-radius:16px;
width:90%;max-width:300px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(34,197,94,0.2);
}

/* BALANCE */
.balance{
text-align:center;
font-size:32px;
margin:15px 0;
color:#22c55e;
text-shadow:0 0 20px rgba(34,197,94,0.7);
}

/* CARD */
.card{
margin:12px;
padding:15px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(34,197,94,0.2);
backdrop-filter:blur(10px);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
outline:none;
}

input:focus{
box-shadow:0 0 10px #22c55e;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#22c55e,#38bdf8);
color:black;
font-weight:bold;
box-shadow:0 0 15px rgba(34,197,94,0.6);
}
button:active{transform:scale(0.95)}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* NAV */
.nav{
position:fixed;
bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#020617;
padding:10px;
border-top:1px solid #1e293b;
}

.nav div{
opacity:0.5;
font-size:18px;
}

.nav .active{
opacity:1;
color:#22c55e;
text-shadow:0 0 10px #22c55e;
}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:10px;
margin-top:8px;
background:#0f172a;
border-left:3px solid #22c55e;
border-radius:8px;
font-size:14px;
animation:fade 0.3s ease;
}

/* FILTER */
.filter{
display:flex;gap:8px;margin-top:10px;
}

.filter button{
flex:1;background:#1e293b;
}

.filter .active{
background:#22c55e;color:black;
}

/* PROGRESS */
.progress{
width:170px;height:170px;
border-radius:50%;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
background:conic-gradient(#22c55e 0%,#1e293b 0%);
box-shadow:0 0 30px rgba(34,197,94,0.7);
}

/* ANIMATION */
@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 ADMIN</h2>
<input id="passwordInput" type="password" placeholder="Password">
<button onclick="checkLogin()">Masuk</button>
<p id="errorText" style="color:red;display:none">Password salah</p>
</div>
</div>

<!-- BALANCE -->
<div class="balance" id="balance">Rp0</div>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" type="number" placeholder="Nominal">

<button onclick="addData()">Simpan</button>
</div>
</div>

<!-- TARGET -->
<div id="targetTab" class="tab">
<div class="card" style="text-align:center">
<h3>🎯 TARGET</h3>
<input id="target" placeholder="Target">
<div class="progress" id="progress">0%</div>
</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card">
<h3>📋 LOG</h3>

<div class="filter">
<button onclick="setFilter('all',this)" class="active">ALL</button>
<button onclick="setFilter('income',this)">+</button>
<button onclick="setFilter('expense',this)">-</button>
</div>

<div id="list"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="switchTab('home',this)">🏠</div>
<div onclick="switchTab('targetTab',this)">🎯</div>
<div onclick="switchTab('listTab',this)">📋</div>
</div>

<script>

// LOGIN
function checkLogin(){
let pass=passwordInput.value;
if(pass==="123"){
loginPage.style.display="none";
}else{
errorText.style.display="block";
setTimeout(()=>window.location.href="index.html",1500);
}
}

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[];
let targetVal=localStorage.getItem("target")||0;
let filter="all";

target.value=targetVal;

// TAB
function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
let tab=document.getElementById(id);
tab.classList.add("active");
tab.classList.add("fade");
document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

// FILTER
function setFilter(f,el){
filter=f;
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

// FORMAT
function rp(x){return "Rp"+(x||0).toLocaleString("id-ID");}

// ANIMATE VALUE
function animateValue(el,start,end,duration){
let startTime=null;
function step(ts){
if(!startTime)startTime=ts;
let progress=Math.min((ts-startTime)/duration,1);
let val=Math.floor(progress*(end-start)+start);
el.innerText="Rp"+val.toLocaleString("id-ID");
if(progress<1)requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

// RENDER
function render(){
list.innerHTML="";
let income=0,expense=0;

data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

if(filter==="all"||filter===d.type){
let el=document.createElement("div");
el.className="item";
el.innerHTML=
"<div>▶ "+d.desc+"</div>"+
"<div style='color:"+(d.type=="income"?"#22c55e":"#ef4444")+"'>"+
(d.type=="income"?"+":"-")+" "+rp(d.amount)+"</div>";
list.appendChild(el);
}
});

let total=income-expense;
animateValue(balance,0,total,500);

// chart
if(window.chart) chart.destroy();
window.chart=new Chart(chart,{
type:"bar",
data:{
labels:["Masuk","Keluar"],
datasets:[{
data:[income,expense],
backgroundColor:["#22c55e","#ef4444"]
}]
},
options:{plugins:{legend:{display:false}}}
});

// progress anim
let t=parseInt(target.value)||0;
let targetPercent=t?Math.min((total/t)*100,100):0;

let start=0;
let interval=setInterval(()=>{
start+=2;
if(start>=targetPercent){
start=targetPercent;
clearInterval(interval);
}
progress.innerText=start+"%";
progress.style.background="conic-gradient(#22c55e "+start+"%,#1e293b 0%)";
},10);

localStorage.setItem("data",JSON.stringify(data));
localStorage.setItem("target",t);
}

// ADD
function addData(){
let d={type:type.value,desc:desc.value,amount:parseInt(amount.value)};
if(!d.desc||!d.amount)return alert("Isi dulu!");
data.push(d);
desc.value="";amount.value="";
render();
}

target.addEventListener("input",render);

render();

</script>

</body>
</html>
