<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Final Boss</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:white}

/* LOGIN PIN */
#loginPage{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:#020617;z-index:9999;
}
.login-box{
background:#0f172a;padding:25px;border-radius:16px;
text-align:center;width:90%;max-width:300px;
}

/* CARD */
.card{
margin:12px;padding:15px;border-radius:16px;
background:rgba(255,255,255,0.05);
}

/* INPUT */
input,select{
width:100%;padding:12px;margin-top:10px;
border-radius:10px;border:none;
background:#020617;color:white;
}

/* BUTTON */
button{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:10px;
background:#22c55e;color:black;font-weight:bold;
}
.reset{background:#ef4444;color:white}

/* NAV */
.nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#020617;padding:10px;
}
.nav div{opacity:0.5}
.nav .active{opacity:1;color:#22c55e}

/* TAB */
.tab{display:none}
.tab.active{display:block}

/* LIST */
.item{
display:flex;justify-content:space-between;
padding:12px;margin-top:8px;
background:#0f172a;border-radius:10px;
}

/* TARGET */
.target-box{
background:#0f172a;padding:12px;border-radius:12px;margin-top:10px;
}
.progress-bar{
height:6px;background:#1e293b;border-radius:10px;margin-top:6px;overflow:hidden;
}
.progress-fill{
height:100%;background:#22c55e;transition:0.4s;
}

/* SUMMARY */
.summary{
display:flex;justify-content:space-between;margin-bottom:10px;
}
.summary div{
background:#0f172a;padding:10px;border-radius:10px;
width:32%;text-align:center;font-size:12px;
}

/* MODAL */
#modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;align-items:center;justify-content:center;
}
.modal-box{
background:#0f172a;padding:20px;border-radius:15px;
width:85%;max-width:320px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🔐 PIN</h2>
<input id="pin" type="number" placeholder="Masukkan PIN">
<button onclick="login()">Masuk</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">

<div class="summary">
<div id="todayIncome">Rp0<br>Hari ini</div>
<div id="sumExpense">Rp0<br>Keluar</div>
<div id="sumTotal">Rp0<br>Saldo</div>
</div>

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="desc" placeholder="Deskripsi">
<input id="amount" placeholder="Rp 0">

<button onclick="addData()">Simpan</button>

</div>
</div>

<!-- TARGET -->
<div id="targetTab" class="tab">
<div class="card">
<h3>🎯 Target</h3>
<div id="targetList"></div>
<button onclick="openAddTarget()">+ Tambah Target</button>
</div>
</div>

<!-- LIST -->
<div id="listTab" class="tab">
<div class="card">

<div id="list"></div>

<button onclick="resetAll()" class="reset">Reset Semua</button>
<button onclick="exportData()">Export</button>
<input type="file" onchange="importData(event)">

</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="active" onclick="switchTab('home',this)">🏠</div>
<div onclick="switchTab('targetTab',this)">🎯</div>
<div onclick="switchTab('listTab',this)">📋</div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h3 id="modalTitle"></h3>
<input id="modalInput" placeholder="Rp 0">
<button onclick="submitModal()">Simpan</button>
<button onclick="closeModal()">Batal</button>
</div>
</div>

<script>

// LOGIN
function login(){
if(pin.value==="1234"){
loginPage.style.display="none";
}
}

// FORMAT
function formatRp(v){
v=v.replace(/[^0-9]/g,"");
return "Rp "+(v?parseInt(v).toLocaleString("id-ID"):"0");
}
function getNum(v){
return parseInt(v.replace(/[^0-9]/g,""))||0;
}

amount.oninput=()=>amount.value=formatRp(amount.value);
modalInput.oninput=()=>modalInput.value=formatRp(modalInput.value);

// DATA
let data=JSON.parse(localStorage.getItem("data"))||[];
let targets=JSON.parse(localStorage.getItem("targets"))||[];

// TAB
function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

// MODAL
let cb=null;
function openModal(title,callback){
modal.style.display="flex";
modalTitle.innerText=title;
modalInput.value="";
cb=callback;
}
function closeModal(){modal.style.display="none";}
function submitModal(){
let val=getNum(modalInput.value);
if(!val)return;
cb(val);
closeModal();
}

// DATA
function addData(){
data.push({
type:type.value,
desc:desc.value,
amount:getNum(amount.value),
date:new Date().toDateString()
});
desc.value="";amount.value="";
render();
}

// TARGET
function openAddTarget(){
openModal("Target",(val)=>{
targets.push({name:"Target "+(targets.length+1),target:val,current:0});
saveTargets();renderTargets();
});
}
function addMoney(i){
openModal("Tambah",(val)=>{
targets[i].current+=val;
saveTargets();renderTargets();
});
}

// SAVE
function saveTargets(){
localStorage.setItem("targets",JSON.stringify(targets));
}

// RENDER TARGET
function renderTargets(){
targetList.innerHTML="";
targets.forEach((t,i)=>{
let p=Math.min((t.current/t.target)*100,100);
targetList.innerHTML+=`
<div class="target-box">
<div style="display:flex;justify-content:space-between">
<b>${t.name}</b>
<span onclick="addMoney(${i})">➕</span>
</div>
<small>Rp${t.current} / Rp${t.target}</small>
<div class="progress-bar">
<div class="progress-fill" style="width:${p}%"></div>
</div>
</div>`;
});
}

// RENDER
function render(){
let income=0,expense=0,today=0;
list.innerHTML="";

data.forEach(d=>{
if(d.type=="income") income+=d.amount;
else expense+=d.amount;

if(d.date===new Date().toDateString()) today+=d.amount;

list.innerHTML+=`
<div class="item">
<div>${d.desc}</div>
<div>${d.type=="income"?"+":"-"} Rp${d.amount}</div>
</div>`;
});

todayIncome.innerHTML="Rp"+today+"<br>Hari ini";
sumExpense.innerHTML="Rp"+expense+"<br>Keluar";
sumTotal.innerHTML="Rp"+(income-expense)+"<br>Saldo";

localStorage.setItem("data",JSON.stringify(data));
}

// RESET
function resetAll(){
if(confirm("Reset semua?")){
data=[];targets=[];
localStorage.clear();
render();renderTargets();
}
}

// EXPORT
function exportData(){
let blob=new Blob([JSON.stringify({data,targets})]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

// IMPORT
function importData(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(){
let d=JSON.parse(reader.result);
data=d.data||[];
targets=d.targets||[];
render();renderTargets();
}
reader.readAsText(file);
}

// INIT
render();renderTargets();

</script>

</body>
</html>
