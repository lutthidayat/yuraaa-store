<script>
const SHEET_URL="https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1";
let allData=[],currentData=[],currentGame='all',hideSold=false;

async function loadData(){
 const res=await fetch(SHEET_URL);
 allData=await res.json();
 apply();
}

function parseHarga(h){
 return parseInt((h||'').replace(/[^0-9]/g,''))||0;
}

function apply(){
 let data=[...allData];

 if(currentGame!=='all'){
  data=data.filter(a=>(a.Game||'').toLowerCase()===currentGame);
 }

 if(hideSold){
  data=data.filter(a=>(a.Status||'').toLowerCase()!=='sold');
 }

 currentData=data;
 sortMurah();
}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 // 🔥 READY di atas, SOLD di bawah
 data.sort((a,b)=>{
   const statusA=(a.Status||'ready').toLowerCase();
   const statusB=(b.Status||'ready').toLowerCase();

   if(statusA==='sold' && statusB!=='sold') return 1;
   if(statusA!=='sold' && statusB==='sold') return -1;

   return 0;
 });

 data.forEach(a=>{
  const img=a.Gambar?a.Gambar.split(',')[0]:'';
  const i=currentData.indexOf(a);

  const normal=parseHarga(a.Diskon);
  const harga=parseHarga(a.Harga);

  let diskon='';
  if(normal && harga && normal>harga){
    const persen=Math.round((normal-harga)/normal*100);
    diskon=`<div class="old">${a.Diskon}</div>
            <div class="discount">-${persen}%</div>`;
  }

  const status=(a.Status||'ready').toLowerCase();
  const label=(a.Label||'').toLowerCase();

  // 🔥 BADGE CUSTOM
  let customBadge='';
  if(label==='hot'){
    customBadge='<div class="badge hot" style="right:10px;left:auto">HOT</div>';
  }else if(label==='best'){
    customBadge='<div class="badge best">BEST</div>';
  }else if(label==='promo'){
    customBadge='<div class="badge" style="background:gold;color:black;right:10px;left:auto">PROMO</div>';
  }else if(label==='rare'){
    customBadge='<div class="badge" style="background:purple;color:white;right:10px;left:auto">RARE</div>';
  }

  grid.innerHTML+=`
  <div class="card" onclick="detail(${i})">
    <div class="badge ${status}">${status.toUpperCase()}</div>
    ${customBadge}
    <img src="${img||'https://via.placeholder.com/300'}">
    <h4>${a.Nama||'-'}</h4>
    ${diskon}
    <div class="price">${a.Harga||'-'}</div>
  </div>`;
 });
}

// 🔽 INI HARUS DI LUAR render()
function sortMurah(){
 render([...currentData].sort((a,b)=>parseHarga(a.Harga)-parseHarga(b.Harga)));
}

function sortMahal(){
 render([...currentData].sort((a,b)=>parseHarga(b.Harga)-parseHarga(a.Harga)));
}

function filterGame(g){
 currentGame=g;
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 event.target.classList.add('active');
 apply();
}

function toggleSold(){
 hideSold=!hideSold;
 apply();
}

function detail(i){
 const a=currentData[i];
 const imgs=a.Gambar?a.Gambar.split(','):[];
 const p=document.getElementById('popup');

 p.innerHTML=`
 <div class="popup-content">
  <span onclick="closePop()">✖</span>
  <div class="slider">${imgs.map(img=>`<img src="${img.trim()}">`).join('')}</div>
  <h3>${a.Nama||'-'}</h3>
  <div class="price">${a.Harga||'-'}</div>
  <p>${a.Deskripsi||''}</p>
  <a href="https://wa.me/6285939286029?text=Saya mau ${encodeURIComponent(a.Nama||'')}" class="btn wa">WhatsApp</a>
  <a href="https://www.facebook.com/share/1Nk4kQ2FXJ/" class="btn fb">Facebook</a>
 </div>`;

 p.style.display='flex';
}

function closePop(){
 document.getElementById('popup').style.display='none';
}

document.getElementById('search').addEventListener('input',e=>{
 const val=e.target.value.toLowerCase();
 render(currentData.filter(a=>(a.Nama||'').toLowerCase().includes(val)));
});

loadData();
</script>
