<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yuraaa Store</title>

<style>
body{font-family:sans-serif;background:#020617;color:white;margin:0}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px}

.card{background:#0f172a;padding:10px;border-radius:15px;cursor:pointer}
.card img{width:100%;height:140px;object-fit:cover;border-radius:10px}

.price{color:#22c55e;font-weight:bold}

.popup{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 display:none;
 background:rgba(0,0,0,0.9);
 justify-content:center;
 align-items:center;
}

.popup-content{
 background:#020617;
 padding:15px;
 border-radius:15px;
 width:90%;
 max-width:400px;
}

.btn{
 display:block;
 margin-top:10px;
 padding:10px;
 text-align:center;
 border-radius:10px;
 text-decoration:none;
 font-weight:bold;
}

.wa{background:#22c55e;color:black}
.fb{background:#1877f2;color:white}
</style>
</head>

<body>

<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1";

let allData=[];

async function loadData(){
 const res=await fetch(SHEET_URL);
 const data=await res.json();
 allData=data;
 render(data);
}

function parseHarga(h){
 return parseInt((h||'').replace(/[^0-9]/g,''))||0
}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 data.forEach(a=>{
  const img=a.Gambar ? a.Gambar.split(',')[0] : '';

  grid.innerHTML+=`
  <div class="card" onclick='detail(${JSON.stringify(a)})'>
    <img src="${img || 'https://via.placeholder.com/300'}">
    <h4>${a.Nama||'-'}</h4>
    <div class="price">${a.Harga||'-'}</div>
  </div>`;
 });
}

function detail(a){
 const images = a.Gambar ? a.Gambar.split(',') : [];
 const p=document.getElementById('popup');

 p.innerHTML=`
 <div class="popup-content">

 <span onclick="closePop()" style="cursor:pointer">✖</span>

 <div style="display:flex;gap:8px;overflow:auto;margin:10px 0">
   ${images.map(img=>`
     <img src="${img}" style="width:100%;max-width:120px;border-radius:10px">
   `).join('')}
 </div>

 <h3>${a.Nama}</h3>
 <div class="price">${a.Harga}</div>
 <p>${a.Deskripsi||''}</p>

 <a href="https://wa.me/6285939286029?text=Saya mau ${encodeURIComponent(a.Nama)}" class="btn wa">Chat WhatsApp</a>
 <a href="#" class="btn fb">Facebook</a>

 </div>`;

 p.style.display='flex';
}

function closePop(){
 document.getElementById('popup').style.display='none';
}

loadData();
</script>

</body>
</html>
