<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#020617;color:#e5e7eb}

/* HEADER */
header{text-align:center;padding:20px 10px}
h1{font-size:26px;font-weight:700}
.subtitle{font-size:12px;color:#94a3b8;margin-top:4px}

/* TAB */
.tabs{
 display:flex;
 gap:8px;
 overflow-x:auto;
 padding:10px;
}
.tab{
 padding:8px 14px;
 border-radius:999px;
 background:#0f172a;
 color:#94a3b8;
 font-size:12px;
 white-space:nowrap;
}
.tab.active{background:#22c55e;color:black}

/* GRID */
.grid{
 display:grid;
 gap:16px;
 padding:12px;
}

/* CARD */
.card{
 position:relative;
 background:linear-gradient(145deg,#0b1220,#020617);
 border-radius:20px;
 padding:12px;
 border:1px solid #1e293b;
 cursor:pointer;
 transition:.2s;
}
.card:active{transform:scale(0.97)}

.card img{
 width:100%;
 height:160px;
 border-radius:14px;
 object-fit:cover;
 margin-bottom:8px;
}

/* STATUS */
.card.sold{opacity:0.5}
.card.proses{opacity:0.7}

/* BADGE */
.badge{
 position:absolute;
 top:10px;
 left:10px;
 padding:5px 10px;
 border-radius:999px;
 font-size:11px;
 z-index:2;
}
.ready{background:#22c55e;color:black}
.sold{background:#ef4444;color:white}
.proses{background:#f59e0b;color:black}

/* LABEL */
.badge-right{
 position:absolute;
 top:10px;
 right:10px;
 padding:5px 10px;
 border-radius:999px;
 font-size:11px;
 z-index:2;
}
.promo{background:gold;color:black}

/* TEXT */
.card h4{font-size:16px;margin-top:4px}
.game{font-size:12px;color:#94a3b8}

/* PRICE */
.price{color:#22c55e;font-weight:bold;font-size:18px;margin-top:4px}
.old{text-decoration:line-through;font-size:12px;color:#64748b}

/* DISKON */
.discount{
 background:linear-gradient(135deg,#ff3b3b,#ff0000);
 color:white;
 padding:4px 10px;
 border-radius:999px;
 font-size:11px;
 font-weight:bold;
 display:inline-block;
 margin-top:6px;
}

/* POPUP */
.popup{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 display:none;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(6px);
 justify-content:center;
 align-items:center;
 z-index:999; /* 🔥 FIX badge ketimpa */
}

.popup-box{
 background:linear-gradient(145deg,#020617,#0f172a);
 padding:20px;
 border-radius:20px;
 width:90%;
 max-width:320px;
 text-align:center;
}

/* SLIDER */
.slider{
 display:flex;
 gap:8px;
 overflow-x:auto;
 margin-bottom:10px;
}
.slider.center{justify-content:center}
.slider img{
 height:120px;
 border-radius:10px;
}

/* BUTTON */
.btn{
 display:block;
 margin:10px 0;
 padding:12px;
 border-radius:14px;
 text-decoration:none;
 font-weight:600;
}
.wa{background:#22c55e;color:black}
.fb{background:#3b82f6;color:white}

.close-btn{
 margin-top:8px;
 padding:10px;
 border:none;
 border-radius:12px;
 background:#1e293b;
 color:white;
 width:100%;
}
</style>
</head>

<body>

<header>
<h1>YURAAA STORE 🎮</h1>
<p class="subtitle">Akun Game Murah • Trusted</p>
</header>

<div class="tabs" id="gameTabs">
<button onclick="setGame('all',this)" class="tab active">Semua</button>

<button onclick="setGame('honkai star rail',this)" class="tab">
🎮 Honkai Star Rail
</button>

<button onclick="setGame('solo leveling',this)" class="tab">
⚔️ Solo Leveling
</button>

<button onclick="setGame('mobile legend',this)" class="tab">
🔥 Mobile Legend
</button>

<button onclick="setGame('arena breakout',this)" class="tab">
💥 Arena Breakout
</button>

<button onclick="setGame('arknight endfield',this)" class="tab">
🧪 Arknights Endfield
</button>
</div>

<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
let allData=[];
let currentGame='all';

function formatRupiah(num){
 return "Rp " + num.toLocaleString("id-ID");
}

document.addEventListener("DOMContentLoaded", async ()=>{
 const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1");
 allData=await res.json();
 apply();
});

function parseHarga(h){
 return parseInt((h||'').replace(/[^0-9]/g,''))||0;
}

function apply(){
 let data=[...allData];

 if(currentGame!=='all'){
  data=data.filter(a=>(a.Game||'').toLowerCase().includes(currentGame));
 }

 render(data);
}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 data.forEach(a=>{
  const img=(a.Gambar||'').split(',')[0];
  const status=(a.Status||'ready').toLowerCase();
  const label=(a.Label||'').toLowerCase();

  const harga=parseHarga(a.Harga);
  const normal=parseHarga(a.Diskon);

  let diskon='';
  if(normal && harga && normal>harga){
    const persen=Math.round((normal-harga)/normal*100);
    diskon=`<div class="old">${a.Diskon}</div>
            <div class="discount">🔥 -${persen}%</div>`;
  }

  let labelHTML='';
  if(label==='promo') labelHTML='<div class="badge-right promo">PROMO</div>';

  grid.innerHTML+=`
  <div class="card ${status}" onclick='handleClick(${JSON.stringify(a)})'>
    <div class="badge ${status}">${status.toUpperCase()}</div>
    ${labelHTML}
    <img src="${img}">
    <h4>${a.Nama||'-'}</h4>
    <div class="game">${a.Game||''}</div>
    <div class="price">${formatRupiah(harga)}</div>
    ${diskon}
  </div>`;
 });
}

function setGame(g,el){
 currentGame=g;
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
 apply();
}

function handleClick(a){
 const popup=document.getElementById('popup');
 const status=(a.Status||'ready').toLowerCase();

 if(status==='sold'){
  popup.innerHTML=`<div class="popup-box">
    <h3>❌ Yah, akun ini sudah terjual 😢</h3>
    <button class="close-btn" onclick="tutup()">Tutup</button>
  </div>`;
 }

 else{
  const harga=parseHarga(a.Harga);
  const imgs=(a.Gambar||'').split(',');

  const wa=`https://wa.me/6285939286029?text=${encodeURIComponent(
   `Halo kak, saya mau beli akun:\n${a.Nama}\n${formatRupiah(harga)}`
  )}`;

  const fb=`https://www.facebook.com/share/1Nk4kQ2FXJ/`;

  popup.innerHTML=`
  <div class="popup-box">

    <div class="slider ${imgs.length===1?'center':''}">
      ${imgs.map(i=>`<img src="${i.trim()}">`).join('')}
    </div>

    <h3>${a.Nama}</h3>
    <div class="game">${a.Game}</div>
    <div class="price">${formatRupiah(harga)}</div>

    <a href="${wa}" class="btn wa">⚡ Beli Cepat (Direct)</a>
    <a href="${fb}" class="btn fb">🔒 Aman via Middleman</a>

    <button class="close-btn" onclick="tutup()">Tutup</button>
  </div>`;
 }

 popup.style.display='flex';
}

function tutup(){
 document.getElementById('popup').style.display='none';
}
</script>

</body>
</html>
