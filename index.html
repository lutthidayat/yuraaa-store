<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<style>
body{font-family:sans-serif;background:#020617;color:white;margin:0}
header{text-align:center;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:15px}
.card{background:#0f172a;padding:10px;border-radius:10px}
.card img{width:100%;border-radius:10px}
.price{color:#22c55e}
input{margin:10px;padding:10px;width:90%;border-radius:10px;border:none;display:block;margin:auto}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.9);justify-content:center;align-items:center}
.popup-content{background:#020617;padding:15px;border-radius:10px;width:90%;max-width:400px}
.btn{display:block;margin-top:10px;padding:10px;background:#22c55e;color:black;text-align:center;text-decoration:none}
</style>
</head>

<body>

<header>
<h1>YURAAA STORE 🚀</h1>
<p>Akun Game Murah • Aman</p>
</header>

<input id="search" placeholder="Cari akun...">

<div class="grid"></div>

<div class="popup" id="popup"></div>

<script>

// 🔥 GANTI ID INI SAJA
const SHEET_URL = "const SHEET_URL = "https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1";";

let allData = [];

async function loadData(){
  const res = await fetch(SHEET_URL);
  const data = await res.json();
  allData = data;
  render(data);
}

function render(data){
  const grid = document.querySelector(".grid");
  grid.innerHTML="";

  data.forEach((a,i)=>{
    grid.innerHTML += `
    <div class="card" onclick="detail(${i})">
      <img src="${a.Gambar}">
      <h4>${a.Nama}</h4>
      <div class="price">${a.Harga}</div>
    </div>`;
  });
}

function detail(i){
  const a = allData[i];
  const popup = document.getElementById("popup");
  popup.innerHTML = `
  <div class="popup-content">
    <span onclick="closePop()">✖</span>
    <img src="${a.Gambar}" style="width:100%">
    <h3>${a.Nama}</h3>
    <div class="price">${a.Harga}</div>
    <p>${a.Deskripsi || ''}</p>
    <a href="https://wa.me/6285939286029?text=Saya mau ${a.Nama}" class="btn">Beli</a>
  </div>`;
  popup.style.display="flex";
}

function closePop(){
  document.getElementById("popup").style.display="none";
}

// SEARCH
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();
  const filtered = allData.filter(a=>a.Nama.toLowerCase().includes(val));
  render(filtered);
});

loadData();

</script>

</body>
</html>
