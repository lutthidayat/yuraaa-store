<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#020617;color:#e5e7eb}

/* HEADER */
header{text-align:center;padding:16px}
h1{font-size:24px}
.subtitle{font-size:12px;color:#94a3b8}

/* TAB */
.tabs{display:flex;gap:8px;justify-content:center;margin:10px}
.tab{padding:8px 14px;border-radius:999px;background:#0f172a;color:#94a3b8;font-size:12px}
.tab.active{background:#22c55e;color:black}

/* TOOLBAR */
.toolbar{text-align:center;margin:10px}
.toolbar button{margin:5px;padding:8px 12px;border-radius:12px;border:none}

/* GRID */
.grid{display:grid;gap:14px;padding:12px}

/* CARD */
.card{
 position:relative;
 background:#0b1220;
 border-radius:18px;
 padding:10px;
 cursor:pointer;
 border:1px solid #1e293b;
}
.card img{
 width:100%;
 height:150px;
 border-radius:14px;
 object-fit:cover;
}

/* STATUS */
.card.sold{opacity:0.5;filter:grayscale(0.4)}
.card.proses{opacity:0.7}

.card.sold::after{
 content:"TERJUAL";
 position:absolute;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:#ef4444;
 padding:6px 12px;
 border-radius:8px;
 font-size:12px;
}

.card.proses::after{
 content:"PROSES";
 position:absolute;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:#f59e0b;
 padding:6px 12px;
 border-radius:8px;
 font-size:12px;
}

/* BADGE */
.badge{position:absolute;top:10px;left:10px;padding:4px 8px;border-radius:999px;font-size:10px}
.badge.ready{background:#22c55e;color:black}
.badge.sold{background:#ef4444;color:white}
.badge.proses{background:#f59e0b;color:black}

/* PRICE */
.price{color:#22c55e;font-weight:bold}
.old{text-decoration:line-through;font-size:12px;color:#64748b}
.discount{background:#ef4444;color:white;padding:3px 6px;border-radius:6px;font-size:10px}

/* POPUP */
.popup{
 position:fixed;top:0;left:0;width:100%;height:100%;
 display:none;background:rgba(0,0,0,0.6);
 justify-content:center;align-items:center;
}
.popup-box{
 background:#020617;padding:16px;border-radius:16px;width:90%;max-width:320px;text-align:center;
}

/* BUTTON */
.btn{display:block;margin:8px 0;padding:10px;border-radius:10px;text-decoration:none}
.wa{background:#22c55e;color:black}
.fb{background:#3b82f6;color:white}
.close-btn{margin-top:8px;padding:8px;border:none;border-radius:10px;background:#1e293b;color:white;width:100%}
</style>
</head>

<body>

<header>
<h1>YURAAA STORE 🎮</h1>
<p class="subtitle">Akun Game Murah • Trusted</p>
</header>

<!-- FILTER GAME -->
<div class="tabs">
<button onclick="setGame('all',this)" class="tab active">Semua</button>
<button onclick="setGame('hsr',this)" class="tab">HSR</button>
<button onclick="setGame('solo',this)" class="tab">Solo</button>
<button onclick="setGame('ml',this)" class="tab">ML</button>
<button onclick="setGame('arena',this)" class="tab">Arena</button>
</div>

<!-- FILTER STATUS -->
<div class="tabs">
<button onclick="setStatus('all',this)" class="tab active">Semua</button>
<button onclick="setStatus('ready',this)" class="tab">Ready</button>
<button onclick="setStatus('proses',this)" class="tab">Proses</button>
<button onclick="setStatus('sold',this)" class="tab">Sold</button>
</div>

<div id="loading" style="text-align:center;padding:20px">Loading...</div>
<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
let allData=[];
let currentGame='all';
let currentStatus='all';

function formatRupiah(num){
 return "Rp " + num.toLocaleString("id-ID");
}

document.addEventListener("DOMContentLoaded", async ()=>{
 const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1");
 allData=await res.json();
 document.getElementById('loading').style.display='none';
 apply();
});

function parseHarga(h){
 return parseInt((h||'').replace(/[^0-9]/g,''))||0;
}

function apply(){
 let data=[...allData];

 // FILTER GAME
 if(currentGame!=='all'){
  data=data.filter(a=>(a.Game||'').toLowerCase()===currentGame);
 }

 // FILTER STATUS
 if(currentStatus!=='all'){
  data=data.filter(a=>(a.Status||'ready').toLowerCase()===currentStatus);
 }

 render(data);
}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 data.sort((a,b)=>{
  const order={ready:1, proses:2, sold:3};
  const A=(a.Status||'ready').toLowerCase();
  const B=(b.Status||'ready').toLowerCase();

  if(order[A]!==order[B]) return order[A]-order[B];
  return parseHarga(a.Harga)-parseHarga(b.Harga);
 });

 data.forEach(a=>{
  const img=(a.Gambar||'').split(',')[0];
  const status=(a.Status||'ready').toLowerCase();
  const label=(a.Label||'').toLowerCase();

  const harga=parseHarga(a.Harga);
  const normal=parseHarga(a.Diskon);

  // 🔥 DISKON BALIK
  let diskon='';
  if(normal && harga && normal>harga){
    const persen=Math.round((normal-harga)/normal*100);
    diskon=`<div class="old">${a.Diskon}</div>
            <div class="discount">-${persen}%</div>`;
  }

  // 🔥 LABEL BALIK
  let labelHTML='';
  if(label==='hot'){
    labelHTML='<div class="badge-right hot">HOT</div>';
  }
  else if(label==='promo'){
    labelHTML='<div class="badge-right promo">PROMO</div>';
  }

  grid.innerHTML+=`
  <div class="card ${status}" onclick='handleClick(${JSON.stringify(a)})'>
    <div class="badge ${status}">${status.toUpperCase()}</div>
    ${labelHTML}
    <img src="${img}">
    <h4>${a.Nama}</h4>
    <div class="price">${formatRupiah(harga)}</div>
    ${diskon}
  </div>`;
 });
}

 // SORT
 data.sort((a,b)=>{
  const order={ready:1, proses:2, sold:3};
  const A=(a.Status||'ready').toLowerCase();
  const B=(b.Status||'ready').toLowerCase();

  if(order[A]!==order[B]) return order[A]-order[B];
  return parseHarga(a.Harga)-parseHarga(b.Harga);
 });

 data.forEach(a=>{
  const img=(a.Gambar||'').split(',')[0];
  const status=(a.Status||'ready').toLowerCase();
  const harga=parseHarga(a.Harga);

  grid.innerHTML+=`
  <div class="card ${status}" onclick='handleClick(${JSON.stringify(a)})'>
    <div class="badge ${status}">${status.toUpperCase()}</div>
    <img src="${img}">
    <h4>${a.Nama}</h4>
    <div class="price">${formatRupiah(harga)}</div>
  </div>`;
 });
}

// FILTER FUNCTION
function setGame(g,el){
 currentGame=g;
 document.querySelectorAll('.tabs:nth-child(2) .tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
 apply();
}

function setStatus(s,el){
 currentStatus=s;
 document.querySelectorAll('.tabs:nth-child(3) .tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
 apply();
}

// POPUP
function handleClick(a){
 const popup=document.getElementById('popup');
 const status=(a.Status||'ready').toLowerCase();

 if(status==='sold'){
  popup.innerHTML=`<div class="popup-box"><h3>❌ SOLD</h3><button class="close-btn" onclick="tutup()">Tutup</button></div>`;
 }
 else if(status==='proses'){
  popup.innerHTML=`<div class="popup-box"><h3>⏳ Sedang Diproses</h3><button class="close-btn" onclick="tutup()">Tutup</button></div>`;
 }
 else{
  const harga=parseHarga(a.Harga);
  const pesan=`Halo kak, saya mau beli akun:\n${a.Nama}\n${a.Game}\n${formatRupiah(harga)}`;
  const wa=`https://wa.me/6285939286029?text=${encodeURIComponent(pesan)}`;

  popup.innerHTML=`<div class="popup-box">
  <h3>${a.Nama}</h3>
  <div class="price">${formatRupiah(harga)}</div>
  <a href="${wa}" class="btn wa">Beli (WA)</a>
  <button class="close-btn" onclick="tutup()">Tutup</button>
  </div>`;
 }

 popup.style.display='flex';
}

function tutup(){
 document.getElementById('popup').style.display='none';
}
</script>

</body>
</html>
