<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Yuraaa Store</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#0b1225,#020617);
  color:#e5e7eb;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:20px;
}
.logo{font-weight:700;margin-bottom:20px}

.profile{
  background:#0f172a;
  padding:15px;
  border-radius:16px;
  text-align:center;
}
.profile img{width:70px;border-radius:50%}

.menu div{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}
.menu div:hover{background:#1e293b}

/* MAIN */
.main{flex:1;padding:25px}

/* TAB */
.tabs{display:flex;gap:20px;margin-bottom:20px}
.tab{opacity:.5;cursor:pointer}
.tab.active{opacity:1;border-bottom:2px solid #7c3aed}

/* FILTER */
.filters{display:flex;gap:10px;margin-bottom:15px}
input,select{
  padding:10px;
  border-radius:10px;
  background:#0f172a;
  border:1px solid #1e293b;
  color:white;
}

/* TAG */
.tags{display:flex;gap:10px;margin-bottom:15px}
.tag{
  padding:6px 12px;
  border-radius:20px;
  background:#0f172a;
  cursor:pointer;
}
.tag.active{background:#7c3aed}

/* CARD */
.card{
  display:flex;
  gap:15px;
  background:#0b1225;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:18px;
  margin-bottom:15px;
  position:relative;
  transition:.2s;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(124,58,237,.2);
}

/* TAG BADGE */
.topTag{
  position:absolute;
  right:10px;
  top:10px;
  background:#ef4444;
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
}

/* SLIDER */
.swiper{
  width:150px;
  height:150px;
  border-radius:12px;
  overflow:hidden;
}
.swiper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INFO */
.info{flex:1}
.price{color:#22c55e;font-weight:bold}
.old{text-decoration:line-through;color:#6b7280;font-size:12px}
.discount{color:#ef4444;font-size:12px}

/* STATUS */
.badge{
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
}
.ready{background:#16a34a}
.sold{background:#dc2626}
.proses{background:#eab308}

/* ACTION */
.actions{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.btn{
  padding:10px;
  border-radius:10px;
  text-align:center;
}
.wa{background:#16a34a}
.fb{background:#1877f2}

/* ADMIN */
.admin{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#020617;
  padding:20px;
  border-left:1px solid #1e293b;
  overflow:auto;
}
.hidden{display:none}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">YURAAA STORE</div>

  <div class="profile">
    <img src="https://i.imgur.com/1X6VQvR.png">
    <h3>Yuraaa Store</h3>
    <p>⭐ 4.9 Trusted</p>
  </div>

  <div class="menu">
    <div onclick="switchTab('list')">🎮 List Akun</div>
    <div onclick="switchTab('riwayat')">📜 Riwayat</div>
    <div onclick="toggleAdmin()">⚙ Admin</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('list')">LIST AKUN</div>
    <div class="tab" onclick="switchTab('riwayat')">RIWAYAT</div>
  </div>

  <div class="filters">
    <select id="gameFilter"></select>
    <select id="statusFilter">
      <option value="">Semua</option>
      <option value="ready">Ready</option>
      <option value="sold">Sold</option>
      <option value="proses">Proses</option>
    </select>
    <input id="search" placeholder="Cari akun...">
  </div>

  <div class="tags">
    <div class="tag active" onclick="setTag('')">Semua</div>
    <div class="tag" onclick="setTag('hot')">Hot</div>
    <div class="tag" onclick="setTag('new')">New</div>
    <div class="tag" onclick="setTag('promo')">Promo</div>
  </div>

  <div id="listTab"></div>
  <div id="riwayatTab" class="hidden"></div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin hidden">
<h3>Admin Panel</h3>

<input id="a_nama" placeholder="Nama"><br><br>
<input id="a_game" placeholder="Game"><br><br>
<input id="a_harga" placeholder="Harga"><br><br>
<input id="a_harga_coret" placeholder="Harga Coret"><br><br>

<select id="a_status">
<option value="ready">Ready</option>
<option value="proses">Proses</option>
<option value="sold">Sold</option>
</select><br><br>

<input id="a_tag" placeholder="Tag"><br><br>
<input id="a_img1" placeholder="Link gambar (pisah ,)"><br><br>

<button onclick="addData()">Tambah</button>

<hr>
<div id="adminList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const API="https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/List";
const GAS_URL="ISI_URL_APPS_SCRIPT_KAMU";
const WA_NUMBER="628xxxx";
const FB_LINK="https://facebook.com/xxxx";

let DATA=[],currentTag="";

fetch(API).then(r=>r.json()).then(d=>{
  DATA=d;
  initFilter();
  render();
});

function kirim(data){
  fetch(GAS_URL,{method:"POST",body:JSON.stringify(data)});
}

function addData(){
  const item={
    id:Date.now(),
    nama:a_nama.value,
    game:a_game.value,
    harga:Number(a_harga.value),
    harga_coret:Number(a_harga_coret.value),
    status:a_status.value,
    tag:a_tag.value,
    gambar1:a_img1.value
  };
  DATA.push(item);
  kirim(item);
  render();
  renderAdmin();
}

function render(){
  listTab.innerHTML="";
  riwayatTab.innerHTML="";

  DATA.forEach(item=>{
    if(gameFilter.value && item.game!==gameFilter.value) return;
    if(statusFilter.value && item.status!==statusFilter.value) return;
    if(currentTag && item.tag!==currentTag) return;
    if(search.value && !item.nama.toLowerCase().includes(search.value.toLowerCase())) return;

    const imgs=item.gambar1
      ? item.gambar1.split(",").map(x=>x.trim()).filter(x=>x.startsWith("http"))
      : [];

    const diskon=item.harga_coret?Math.round((1-item.harga/item.harga_coret)*100):0;

    const slider=`
    <div class="swiper">
      <div class="swiper-wrapper">
        ${imgs.map(i=>`<div class="swiper-slide"><img src="${i}"></div>`).join("")}
      </div>
    </div>`;

    const card=`
    <div class="card">
      ${item.tag?`<div class="topTag">${item.tag}</div>`:''}
      ${slider}

      <div class="info">
        <h3>${item.nama}</h3>
        <small>${item.game}</small>

        <p class="price">
        Rp ${item.harga}
        ${item.harga_coret?`<span class="old">Rp ${item.harga_coret}</span>
        <span class="discount">-${diskon}%</span>`:''}
        </p>

        <span class="badge ${item.status}">${item.status}</span>
      </div>

      <div class="actions">
        <a class="btn wa" href="https://wa.me/${WA_NUMBER}" target="_blank">WA</a>
        <a class="btn fb" href="${FB_LINK}" target="_blank">FB</a>
        <button onclick="setSold(${item.id})">Sold</button>
      </div>
    </div>`;

    if(item.status==="sold") riwayatTab.innerHTML+=card;
    else listTab.innerHTML+=card;
  });

  setTimeout(()=> new Swiper('.swiper',{loop:true}),100);
}

function setSold(id){
  const item=DATA.find(x=>x.id==id);
  item.status="sold";
  render();
}

function initFilter(){
  const games=[...new Set(DATA.map(d=>d.game))];
  gameFilter.innerHTML='<option value="">Semua Game</option>';
  games.forEach(g=>gameFilter.innerHTML+=`<option>${g}</option>`);
}

function setTag(tag){
  currentTag=tag;
  render();
}

function switchTab(t){
  if(t==="list"){
    listTab.classList.remove("hidden");
    riwayatTab.classList.add("hidden");
  }else{
    listTab.classList.add("hidden");
    riwayatTab.classList.remove("hidden");
  }
}

function toggleAdmin(){
  adminPanel.classList.toggle("hidden");
}
</script>

</body>
</html>
