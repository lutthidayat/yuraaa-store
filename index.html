<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
}

h1{
  font-size:28px;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:#0f172a;
  border-radius:15px;
  padding:12px;
  border:1px solid #1e293b;
  cursor:pointer;
}

.card img{
  width:100%;
  height:130px;
  border-radius:10px;
  object-fit:cover;
}

.price{
  color:#22c55e;
  font-weight:bold;
}

.badge{
  background:#facc15;
  color:black;
  font-size:10px;
  padding:3px 6px;
  border-radius:20px;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#020617;
  padding:15px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

/* SLIDER */
.slider{
  display:flex;
  overflow-x:auto;
  gap:6px;
}

.slider img{
  width:100%;
  border-radius:10px;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:12px;
  text-align:center;
  border-radius:10px;
  background:#22c55e;
  color:black;
  text-decoration:none;
  font-weight:bold;
}

.close{
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>YURAAA STORE 🚀</h1>
<p>Akun Game Murah • Aman • Fast Respon</p>
</header>

<div class="grid">

<!-- LOOP 10 AKUN -->
<!-- EDIT ISI SAJA -->

<script>
for(let i=1;i<=10;i++){
document.write(`
<div class="card" onclick="openDetail('akun${i}')">
<img src="https://via.placeholder.com/300x150">
<h4>Akun ${i} <span class="badge">HOT</span></h4>
<div class="price">Rp 50.000</div>
<p>Deskripsi akun</p>
</div>
`);
}
</script>

</div>

<!-- POPUP -->
<script>
for(let i=1;i<=10;i++){
document.write(`
<div class="popup" id="akun${i}">
<div class="popup-content">

<span class="close" onclick="closeDetail('akun${i}')">✖</span>

<div class="slider">
<img src="https://via.placeholder.com/300x150">
<img src="https://via.placeholder.com/300x150">
<img src="https://via.placeholder.com/300x150">
</div>

<h3>🔥 Akun ${i}</h3>
<div class="price">Rp 50.000</div>

<p>Detail akun lengkap</p>

<a href="https://wa.me/6285939286029?text=Min saya minat akun ${i}" class="btn">
💬 Beli Sekarang
</a>

</div>
</div>
`);
}
</script>

<script>
function openDetail(id){
 document.getElementById(id).style.display='flex';
}
function closeDetail(id){
 document.getElementById(id).style.display='none';
}
</script>

</body>
</html>
