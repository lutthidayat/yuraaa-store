<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
 --bg:#060b1a;
 --card:#0f172a;
 --card2:#020617;
 --primary:#22c55e; /* hijau fresh */
 --accent:#3b82f6; /* biru modern */
 --danger:#ef4444;
 --text:#e5e7eb;
 --sub:#94a3b8;
}
body{font-family:'Poppins',sans-serif;background:radial-gradient(1000px 500px at 50% -150px,#1e293b,transparent),linear-gradient(180deg,var(--bg),#020617);color:var(--text)}

header{position:sticky;top:0;z-index:10;background:rgba(2,6,23,.7);backdrop-filter:blur(10px);padding:18px 12px 10px;border-bottom:1px solid #1e293b}
h1{font-size:28px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--primary),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.subtitle{color:var(--sub);font-size:12px;text-align:center}

.banner{width:92%;margin:10px auto;border-radius:16px;overflow:hidden;border:1px solid #1e293b;box-shadow:0 20px 40px rgba(0,0,0,.5)}
.banner-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.banner img{width:100%;flex-shrink:0;scroll-snap-align:start}

.search-box{width:92%;margin:10px auto}
.search-box input{width:100%;padding:14px;border-radius:14px;border:none;background:#0f172a;color:white;box-shadow:inset 0 0 0 1px #1e293b}

.tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 10px;justify-content:center}
.tab{padding:8px 14px;border-radius:999px;background:#0f172a;color:var(--sub);font-size:12px;border:1px solid #1e293b}
.tab.active{background:linear-gradient(90deg,var(--primary),#4ade80);color:black;font-weight:600}

.toolbar{display:flex;gap:10px;justify-content:center;margin:14px}
.toolbar button{padding:8px 12px;border-radius:10px;border:none;font-size:12px;font-weight:600}
.btn-green{background:linear-gradient(90deg,var(--primary),#4ade80);color:black}
.btn-gray{background:#1e293b;color:white}

.grid{display:grid;grid-template-columns:1fr;gap:16px;padding:12px}
.card{position:relative;background:linear-gradient(145deg,var(--card),var(--card2));border-radius:16px;padding:10px;border:1px solid #1e293b;box-shadow:0 15px 30px rgba(0,0,0,.5);transition:.25s}
.card:hover{transform:translateY(-3px)}
.card img{width:100%;height:160px;object-fit:cover;border-radius:12px;margin-bottom:8px}

.badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700}
.ready{background:var(--primary);color:black}
.sold{background:var(--danger);color:white}
.hot{background:orange;color:black;box-shadow:0 0 12px orange}
.best{right:10px;left:auto;background:var(--accent);color:black}

h4{font-size:15px}
.price{color:var(--primary);font-size:17px;font-weight:700}
.old{font-size:11px;color:var(--sub);text-decoration:line-through}
.discount{background:var(--danger);padding:3px 6px;border-radius:8px;font-size:10px;display:inline-block;margin-top:4px}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.92);justify-content:center;align-items:center}
.popup-content{background:#020617;padding:14px;border-radius:16px;width:92%;max-width:400px;border:1px solid #1e293b}
.slider{display:flex;overflow-x:auto;gap:8px;scroll-snap-type:x mandatory}
.slider img{width:100%;border-radius:12px;flex-shrink:0;scroll-snap-align:start}

.btn{display:block;margin-top:8px;padding:11px;border-radius:12px;text-align:center;text-decoration:none;font-weight:600}
.wa{background:linear-gradient(90deg,var(--primary),#4ade80);color:black}
.fb{background:#1877f2;color:white}

.footer{text-align:center;padding:12px;color:var(--sub);font-size:11px}
</style>
</head>

<body>
<header>
<h1>YURAAA STORE 🎮</h1>
<p class="subtitle">Akun Game Murah • Aman • Trusted</p>
</header>


</div>

<div class="search-box"><input id="search" placeholder="Cari akun..."></div>

<div class="tabs">
<button onclick="filterGame('all')" class="tab active">Semua</button>
<button onclick="filterGame('hsr')" class="tab">HSR</button>
<button onclick="filterGame('solo')" class="tab">Solo</button>
<button onclick="filterGame('ml')" class="tab">ML</button>
<button onclick="filterGame('arena')" class="tab">Arena</button>
</div>

<div class="toolbar">
<button class="btn-green" onclick="sortMurah()">Termurah</button>
<button class="btn-gray" onclick="sortMahal()">Termahal</button>
<button class="btn-gray" onclick="toggleSold()">Hide SOLD</button>
</div>

<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
const SHEET_URL="https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1";
let allData=[],currentData=[],currentGame='all',hideSold=false;

async function loadData(){const res=await fetch(SHEET_URL);allData=await res.json();apply()}
function parseHarga(h){return parseInt((h||'').replace(/[^0-9]/g,''))||0}

function apply(){let data=[...allData];if(currentGame!=='all')data=data.filter(a=>(a.Game||'').toLowerCase()===currentGame);if(hideSold)data=data.filter(a=>(a.Status||'').toLowerCase()!=='sold');currentData=data;sortMurah()}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 // 🔥 SORT: READY dulu baru SOLD
 data.sort((a,b)=>{
   const statusA=(a.Status||'ready').toLowerCase();
   const statusB=(b.Status||'ready').toLowerCase();

   if(statusA==='sold' && statusB!=='sold') return 1;
   if(statusA!=='sold' && statusB==='sold') return -1;

   return 0;
 });

 data.forEach(a=>{
  const img=a.Gambar?a.Gambar.split(',')[0]:'';
  const i=currentData.indexOf(a);

  const normal=parseHarga(a.Diskon),
        harga=parseHarga(a.Harga);

  let diskon='';
  if(normal && harga && normal>harga){
    const persen=Math.round((normal-harga)/normal*100);
    diskon=`<div class="old">${a.Diskon}</div>
            <div class="discount">-${persen}%</div>`;
  }

  const status=(a.Status||'ready').toLowerCase();
  const label=(a.Label||'').toLowerCase();

  // 🔥 CUSTOM BADGE (DARI SHEET)
  let customBadge='';
  if(label==='hot'){
    customBadge='<div class="badge hot">HOT</div>';
  }else if(label==='best'){
    customBadge='<div class="badge best">BEST</div>';
  }else if(label==='promo'){
    customBadge='<div class="badge" style="background:gold;color:black">PROMO</div>';
  }

  grid.innerHTML+=`
  <div class="card" onclick="detail(${i})">
    <div class="badge ${status}">${status.toUpperCase()}</div>
    ${customBadge}
    <img src="${img||'https://via.placeholder.com/300'}">
    <h4>${a.Nama||'-'}</h4>
    ${diskon}
    <div class="price">${a.Harga||'-'}</div>
  </div>`;
 });
}

function sortMurah(){render([...currentData].sort((a,b)=>parseHarga(a.Harga)-parseHarga(b.Harga)))}
function sortMahal(){render([...currentData].sort((a,b)=>parseHarga(b.Harga)-parseHarga(a.Harga)))}
function filterGame(g){currentGame=g;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');apply()}
function toggleSold(){hideSold=!hideSold;apply()}

function detail(i){const a=currentData[i];const imgs=a.Gambar?a.Gambar.split(','):[];const p=document.getElementById('popup');
 p.innerHTML=`<div class="popup-content"><span onclick="closePop()">✖</span>
 <div class="slider">${imgs.map(img=>`<img src="${img.trim()}">`).join('')}</div>
 <h3>${a.Nama||'-'}</h3><div class="price">${a.Harga||'-'}</div>
 <p>${a.Deskripsi||''}</p>
 <a href="https://wa.me/6285939286029?text=Saya mau ${encodeURIComponent(a.Nama||'')}" class="btn wa">WhatsApp</a>
 <a href="https://www.facebook.com/share/1Nk4kQ2FXJ/" class="btn fb">Facebook</a></div>`;
 p.style.display='flex'}

function closePop(){document.getElementById('popup').style.display='none'}

document.getElementById('search').addEventListener('input',e=>{
 const val=e.target.value.toLowerCase();render(currentData.filter(a=>(a.Nama||'').toLowerCase().includes(val)))})

loadData();
</script>

<div class="footer">© Yuraaa Store • Fast • Trusted • No Drama 🎮</div>
</body>
</html>
