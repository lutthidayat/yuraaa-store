<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#020617;color:#e5e7eb}

/* HEADER */
header{text-align:center;padding:16px}
h1{font-size:24px}
.subtitle{font-size:12px;color:#94a3b8}

/* SEARCH */
.search-box{width:92%;margin:10px auto}
.search-box input{width:100%;padding:10px;border-radius:12px;border:none;background:#0f172a;color:white}

/* TAB */
.tabs{display:flex;gap:8px;justify-content:center;margin:10px}
.tab{padding:8px 14px;border-radius:999px;background:#0f172a;color:#94a3b8;font-size:12px}
.tab.active{background:#22c55e;color:black}

/* TOOLBAR */
.toolbar{text-align:center;margin:10px}
.toolbar button{margin:5px;padding:8px 12px;border-radius:12px;border:none}

/* GRID */
.grid{display:grid;gap:14px;padding:12px}

/* CARD */
.card{
 position:relative;
 background:#0b1220;
 border-radius:18px;
 padding:10px;
 cursor:pointer;
 border:1px solid #1e293b;
}
.card img{
 width:100%;
 height:150px;
 border-radius:14px;
 object-fit:cover;
}

/* SOLD */
.card.sold{
 opacity:0.5;
 filter:grayscale(0.4);
 cursor:not-allowed;
}
.card.sold::after{
 content:"TERJUAL";
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#ef4444;
 padding:6px 12px;
 border-radius:8px;
 font-size:12px;
 font-weight:bold;
}

/* BADGE */
.badge{
 position:absolute;
 top:10px;
 left:10px;
 padding:4px 8px;
 border-radius:999px;
 font-size:10px;
}
.badge.ready{background:#22c55e;color:black}
.badge.sold{background:#ef4444;color:white}

/* LABEL */
.badge-right{
 position:absolute;
 top:10px;
 right:10px;
 padding:4px 8px;
 border-radius:999px;
 font-size:10px;
}
.hot{background:orange}
.promo{background:gold;color:black}

/* PRICE */
.price{
 color:#22c55e;
 font-weight:700;
 font-size:18px;
}
.old{ text-decoration:line-through;font-size:12px;color:#64748b}
.discount{
 background:#ef4444;
 color:white;
 padding:3px 8px;
 border-radius:999px;
 font-size:11px;
 display:inline-block;
 margin-top:4px;
}

/* LOADING */
.loading{
 text-align:center;
 padding:30px;
 color:#94a3b8;
}
.loading::after{
 content:"";
 display:block;
 margin:10px auto;
 width:30px;
 height:30px;
 border:4px solid #1e293b;
 border-top:4px solid #22c55e;
 border-radius:50%;
 animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* POPUP */
.popup{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 display:none;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(6px);
 justify-content:center;
 align-items:center;
}

.popup-box{
 background:#020617;
 padding:16px;
 border-radius:16px;
 width:90%;
 max-width:320px;
 text-align:center;
}

/* SLIDER MANUAL */
.slider{
 display:flex;
 gap:6px;
 overflow-x:auto;
 scroll-snap-type:x mandatory;
}
.slider img{
 height:120px;
 border-radius:10px;
 scroll-snap-align:center;
}

/* CENTER IF 1 IMAGE */
.slider.single{
 justify-content:center;
}

/* BUTTON */
.btn{
 display:block;
 margin:8px 0;
 padding:10px;
 border-radius:10px;
 text-decoration:none;
}
.wa{background:#22c55e;color:black}
.fb{background:#3b82f6;color:white}

.close-btn{
 margin-top:8px;
 padding:8px;
 border:none;
 border-radius:10px;
 background:#1e293b;
 color:white;
 width:100%;
}
</style>
</head>

<body>

<header>
<h1>YURAAA STORE 🎮</h1>
<p class="subtitle">Akun Game Murah • Trusted</p>
</header>

<div class="search-box">
<input id="search" placeholder="Cari akun...">
</div>

<div class="tabs">
<button onclick="filterGame('all',this)" class="tab active">Semua</button>
<button onclick="filterGame('hsr',this)" class="tab">HSR</button>
<button onclick="filterGame('solo',this)" class="tab">Solo</button>
<button onclick="filterGame('ml',this)" class="tab">ML</button>
<button onclick="filterGame('arena',this)" class="tab">Arena</button>
</div>

<div class="toolbar">
<button onclick="sortMurah()">Termurah</button>
<button onclick="sortMahal()">Termahal</button>
<button onclick="toggleSold()">Hide SOLD</button>
</div>

<div id="loading" class="loading">Loading...</div>
<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
let allData=[];
window.currentData=[];
let currentGame='all';
let hideSold=false;

function formatRupiah(num){
 return "Rp " + num.toLocaleString("id-ID");
}

document.addEventListener("DOMContentLoaded", async ()=>{
 const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1");
 allData=await res.json();
 document.getElementById('loading').style.display='none';
 apply();
});

function parseHarga(h){
 return parseInt((h||'').replace(/[^0-9]/g,''))||0;
}

function apply(){
 let data=[...allData];
 if(currentGame!=='all'){
  data=data.filter(a=>(a.Game||'').toLowerCase()===currentGame);
 }
 if(hideSold){
  data=data.filter(a=>(a.Status||'').toLowerCase()!=='sold');
 }
 window.currentData=data;
 sortMurah();
}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 data.sort((a,b)=>{
  const A=(a.Status||'ready').toLowerCase();
  const B=(b.Status||'ready').toLowerCase();
  if(A==='sold' && B!=='sold') return 1;
  if(A!=='sold' && B==='sold') return -1;
  return 0;
 });

 data.forEach(a=>{
  const img=(a.Gambar||'').split(',')[0].trim();
  const status=(a.Status||'ready').toLowerCase();
  const label=(a.Label||'').toLowerCase();
  const harga=parseHarga(a.Harga);
  const normal=parseHarga(a.Diskon);

  let diskon='';
  if(normal && harga && normal>harga){
    const persen=Math.round((normal-harga)/normal*100);
    diskon=`<div class="old">${a.Diskon}</div>
            <div class="discount">-${persen}%</div>`;
  }

  let labelHTML='';
  if(label==='hot') labelHTML='<div class="badge-right hot">HOT</div>';
  if(label==='promo') labelHTML='<div class="badge-right promo">PROMO</div>';

  grid.innerHTML+=`
  <div class="card ${status==='sold'?'sold':''}" onclick='handleClick(${JSON.stringify(a)})'>
    <div class="badge ${status}">${status.toUpperCase()}</div>
    ${labelHTML}
    <img src="${img}">
    <h4>${a.Nama||'-'}</h4>
    <div class="price">${formatRupiah(harga)}</div>
    ${diskon}
  </div>`;
 });
}

// POPUP DETAIL
function handleClick(a){
 const popup=document.getElementById('popup');

 if((a.Status||'').toLowerCase()==='sold'){
  popup.innerHTML=`<div class="popup-box">
    <h3>❌ Akun Sudah SOLD</h3>
    <button class="close-btn" onclick="tutup()">Tutup</button>
  </div>`;
  popup.style.display='flex';
  return;
 }

 const imgs=(a.Gambar||'').split(',');
 const single = imgs.length === 1 ? 'single' : '';

 popup.innerHTML=`
 <div class="popup-box">

   <div class="slider ${single}">
     ${imgs.map(img=>`<img src="${img.trim()}">`).join('')}
   </div>

   <h3>${a.Nama}</h3>
   <div class="price">${formatRupiah(parseHarga(a.Harga))}</div>
   <p style="font-size:12px;color:#94a3b8">${a.Deskripsi||''}</p>

   <a href="https://wa.me/6285939286029?text=${encodeURIComponent(a.Nama)}" class="btn wa">Direct</a>
   <a href="https://www.facebook.com/share/1Nk4kQ2FXJ/" class="btn fb">Middleman</a>

   <button class="close-btn" onclick="tutup()">Tutup</button>
 </div>`;

 popup.style.display='flex';
}

function tutup(){
 document.getElementById('popup').style.display='none';
}

function sortMurah(){
 render([...window.currentData].sort((a,b)=>parseHarga(a.Harga)-parseHarga(b.Harga)));
}
function sortMahal(){
 render([...window.currentData].sort((a,b)=>parseHarga(b.Harga)-parseHarga(a.Harga)));
}
function filterGame(g,el){
 currentGame=g;
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
 apply();
}
function toggleSold(){
 hideSold=!hideSold;
 apply();
}
</script>

</body>
</html>
