<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:radial-gradient(1200px 600px at 50% -200px,#1f2937,transparent),linear-gradient(180deg,#020617,#0b1220);color:white}

/* HEADER */
header{text-align:center;padding:32px 20px 10px}
h1{font-size:36px;font-weight:700;background:linear-gradient(90deg,#38bdf8,#22c55e,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#94a3b8;font-size:14px;margin-top:6px}

.hero{
 width:92%;margin:14px auto 6px; padding:14px;
 border-radius:18px;
 background:linear-gradient(135deg,#0f172a,#020617);
 border:1px solid #1e293b;
 box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 0 20px rgba(56,189,248,.08);
}
.hero p{font-size:13px;color:#cbd5f5}

/* SEARCH */
.search-box{width:92%;margin:14px auto}
.search-box input{
 width:100%;padding:14px 16px;border-radius:16px;border:none;background:#0f172a;color:white;font-size:14px;
 box-shadow:inset 0 0 0 1px #1e293b, 0 10px 20px rgba(0,0,0,.25)
}

/* TABS */
.tabs{display:flex;gap:10px;overflow-x:auto;padding:10px 15px}
.tab{padding:10px 16px;border-radius:999px;background:#0f172a;color:#94a3b8;font-size:13px;border:1px solid #1e293b}
.tab.active{background:#22c55e;color:black;font-weight:600}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;justify-content:center;margin:12px}
.toolbar button{padding:10px 14px;border-radius:12px;border:none;font-weight:600;font-size:13px}
.btn-green{background:#22c55e;color:black}
.btn-gray{background:#1e293b;color:white}

/* GRID */
.grid{display:grid;grid-template-columns:1fr;gap:18px;padding:14px}

/* CARD */
.card{
 position:relative;
 background:linear-gradient(145deg,#0f172a,#020617);
 border-radius:18px; padding:12px;
 border:1px solid #1e293b;
 box-shadow:0 10px 25px rgba(0,0,0,.35);
 transition:.25s ease;
}
.card:hover{transform:translateY(-3px)}
.card img{width:100%;height:165px;object-fit:cover;border-radius:14px;margin-bottom:10px}

/* BADGE */
.badge{
 position:absolute; top:12px; left:12px;
 padding:4px 10px; border-radius:999px; font-size:10px; font-weight:700;
 box-shadow:0 6px 14px rgba(0,0,0,.35);
}
.ready{background:#22c55e;color:black}
.sold{background:#ef4444;color:white}
.hot{background:orange;color:black; box-shadow:0 0 14px rgba(255,165,0,.6)}

h4{font-size:16px;margin:4px 0}
.price{color:#22c55e;font-size:18px;font-weight:700}
.old{font-size:12px;color:#94a3b8;text-decoration:line-through}
.discount{background:#ef4444;padding:4px 8px;border-radius:10px;font-size:11px;display:inline-block;margin-top:4px}

/* POPUP */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.9);justify-content:center;align-items:center}
.popup-content{background:#020617;padding:16px;border-radius:18px;width:92%;max-width:420px;border:1px solid #1e293b;box-shadow:0 20px 40px rgba(0,0,0,.5)}

.slider{display:flex;overflow-x:auto;gap:10px;scroll-snap-type:x mandatory}
.slider img{width:100%;border-radius:12px;flex-shrink:0;scroll-snap-align:start}

.btn{display:block;margin-top:10px;padding:12px;border-radius:12px;text-align:center;text-decoration:none;font-weight:600}
.wa{background:#22c55e;color:black}
.fb{background:#1877f2;color:white}

.footer{padding:14px;text-align:center;color:#64748b;font-size:12px}
</style>
</head>

<body>

<header>
  <h1>YURAAA STORE 🎮</h1>
  <p class="subtitle">Akun Game Murah • Aman • Trusted</p>
  <div class="hero">
    <p>🔥 Promo hari ini • Stok terbatas • Cek detail di setiap akun</p>
  </div>
</header>

<div class="search-box">
  <input id="search" placeholder="Cari akun...">
</div>

<div class="tabs">
  <button onclick="filterGame('all')" class="tab active">Semua</button>
  <button onclick="filterGame('hsr')" class="tab">HSR</button>
  <button onclick="filterGame('solo')" class="tab">Solo</button>
  <button onclick="filterGame('ml')" class="tab">ML</button>
  <button onclick="filterGame('arena')" class="tab">Arena</button>
</div>

<div class="toolbar">
  <button class="btn-green" onclick="sortMurah()">Termurah</button>
  <button class="btn-gray" onclick="sortMahal()">Termahal</button>
  <button class="btn-gray" onclick="toggleSold()">Hide SOLD</button>
</div>

<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1";
let allData=[];let currentData=[];let currentGame='all';let hideSold=false;

async function loadData(){
 const res=await fetch(SHEET_URL);
 const data=await res.json();
 allData=data;
 apply();
}

function parseHarga(h){return parseInt((h||'').replace(/[^0-9]/g,''))||0}

function apply(){
 let data=[...allData];
 if(currentGame!=='all') data=data.filter(a=>(a.Game||'').toLowerCase()===currentGame);
 if(hideSold) data=data.filter(a=>(a.Status||'').toLowerCase()!=='sold');
 currentData=data;
 sortMurah();
}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';
 data.forEach(a=>{
  const img=a.Gambar?a.Gambar.split(',')[0]:'';
  const i=currentData.indexOf(a);

  const normal=parseHarga(a.Diskon);
  const harga=parseHarga(a.Harga);
  let diskon='';
  if(normal && harga && normal>harga){
    const persen=Math.round((normal-harga)/normal*100);
    diskon=`<div class="old">${a.Diskon}</div><div class="discount">-${persen}%</div>`;
  }

  const status=(a.Status||'ready').toLowerCase();

  grid.innerHTML+=`
  <div class="card" onclick="detail(${i})">
    <div class="badge ${status}">${status.toUpperCase()}</div>
    <img src="${img||'https://via.placeholder.com/300'}">
    <h4>${a.Nama||'-'}</h4>
    ${diskon}
    <div class="price">${a.Harga||'-'}</div>
  </div>`;
 });
}

function sortMurah(){render([...currentData].sort((a,b)=>parseHarga(a.Harga)-parseHarga(b.Harga)))}
function sortMahal(){render([...currentData].sort((a,b)=>parseHarga(b.Harga)-parseHarga(a.Harga)))}

function filterGame(g){currentGame=g;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');apply()}
function toggleSold(){hideSold=!hideSold;apply()}

function detail(i){
 const a=currentData[i];
 const imgs=a.Gambar?a.Gambar.split(','):[];
 const p=document.getElementById('popup');

 p.innerHTML=`
 <div class="popup-content">
   <span onclick="closePop()">✖</span>
   <div class="slider">
     ${imgs.map(img=>`<img src="${img.trim()}">`).join('')}
   </div>
   <h3>${a.Nama||'-'}</h3>
   <div class="price">${a.Harga||'-'}</div>
   <p>${a.Deskripsi||''}</p>
   <a href="https://wa.me/6285939286029?text=Saya mau ${encodeURIComponent(a.Nama||'') }" class="btn wa">WhatsApp</a>
   <a href="https://www.facebook.com/share/1Nk4kQ2FXJ/" class="btn fb">Facebook</a>
 </div>`;

 p.style.display='flex';
}

function closePop(){document.getElementById('popup').style.display='none'}

document.getElementById('search').addEventListener('input',e=>{
 const val=e.target.value.toLowerCase();
 render(currentData.filter(a=>(a.Nama||'').toLowerCase().includes(val)))
});

loadData();
</script>

<div class="footer">© Yuraaa Store • Fast • Trusted • No Drama 🎮</div>

</body>
</html>
