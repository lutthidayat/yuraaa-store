<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#020617;color:#e5e7eb}

header{text-align:center;padding:16px}
h1{font-size:24px}
.subtitle{font-size:12px;color:#94a3b8}

.grid{display:grid;gap:14px;padding:12px}

.card{position:relative;background:#0f172a;border-radius:16px;padding:10px;cursor:pointer}
.card img{width:100%;height:150px;border-radius:12px;object-fit:cover}

/* SOLD DISABLE */
.card.sold{
 opacity:0.6;
 cursor:not-allowed;
}

.badge{position:absolute;top:10px;left:10px;padding:4px 8px;border-radius:999px;font-size:10px}
.ready{background:#22c55e;color:black}
.sold{background:#ef4444;color:white}

.badge-right{position:absolute;top:10px;right:10px;padding:4px 8px;border-radius:999px;font-size:10px}
.hot{background:orange}
.promo{background:gold;color:black}

.price{color:#22c55e;font-weight:bold}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.8);justify-content:center;align-items:center}
.popup-box{background:#020617;padding:16px;border-radius:16px;width:90%;max-width:300px;text-align:center}
.btn{display:block;margin:8px 0;padding:10px;border-radius:10px;text-decoration:none}
.wa{background:#22c55e;color:black}
.fb{background:#1877f2;color:white}
</style>
</head>

<body>

<header>
<h1>YURAAA STORE 🎮</h1>
<p class="subtitle">Akun Game Murah • Trusted</p>
</header>

<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
let allData=[];
let currentData=[];

document.addEventListener("DOMContentLoaded", async ()=>{

const SHEET_URL="https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1";

const res=await fetch(SHEET_URL);
allData=await res.json();
currentData=[...allData];

render(currentData);
});

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 data.forEach((a)=>{
  const img=(a.Gambar||'').split(',')[0].trim();
  const status=(a.Status||'ready').toLowerCase();
  const label=(a.Label||'').toLowerCase();

  let labelHTML='';
  if(label==='hot') labelHTML='<div class="badge-right hot">HOT</div>';
  if(label==='promo') labelHTML='<div class="badge-right promo">PROMO</div>';

  grid.innerHTML+=`
  <div class="card ${status}" onclick='handleClick(${JSON.stringify(a)})'>
    <div class="badge ${status}">${status.toUpperCase()}</div>
    ${labelHTML}
    <img src="${img}">
    <h4>${a.Nama||'-'}</h4>
    <div class="price">${a.Harga||'-'}</div>
  </div>`;
 });
}

// 🔥 FIX TOTAL CLICK
function handleClick(a){

 // ❌ BLOCK SOLD
 if((a.Status||'').toLowerCase()==='sold'){
  alert("Akun sudah SOLD ❌");
  return;
 }

 const popup=document.getElementById('popup');

 const pesan=`Halo kak, saya mau beli akun:\n${a.Nama}\nHarga: ${a.Harga}`;

 const wa=`https://wa.me/6285939286029?text=${encodeURIComponent(pesan)}`;
 const fb=`https://www.facebook.com/share/1Nk4kQ2FXJ/`;

 popup.innerHTML=`
 <div class="popup-box">
   <h3>Pilih Metode</h3>
   <a href="${wa}" class="btn wa">Direct (WA)</a>
   <a href="${fb}" class="btn fb">Middleman (FB)</a>
   <button onclick="tutup()">Tutup</button>
 </div>`;

 popup.style.display='flex';
}

function tutup(){
 document.getElementById('popup').style.display='none';
}
</script>

</body>
</html>
