<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuraaa Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#020617;color:#e5e7eb}

/* HEADER */
header{text-align:center;padding:16px}
h1{font-size:24px}
.subtitle{font-size:12px;color:#94a3b8}

/* SEARCH */
.search-box{width:92%;margin:10px auto}
.search-box input{width:100%;padding:10px;border-radius:12px;border:none;background:#0f172a;color:white}

/* TAB */
.tabs{display:flex;gap:8px;justify-content:center;margin:10px}
.tab{padding:8px 14px;border-radius:999px;background:#0f172a;color:#94a3b8;font-size:12px}
.tab.active{background:#22c55e;color:black}

/* TOOLBAR */
.toolbar{text-align:center;margin:10px}
.toolbar button{margin:5px;padding:8px 12px;border-radius:12px;border:none}

/* GRID */
.grid{display:grid;gap:14px;padding:12px}

/* CARD */
.card{position:relative;background:#0f172a;border-radius:18px;padding:10px;cursor:pointer}
.card img{width:100%;height:150px;border-radius:14px;object-fit:cover}

.card.sold{opacity:0.5;cursor:not-allowed}

/* BADGE */
.badge{position:absolute;top:10px;left:10px;padding:4px 8px;border-radius:999px;font-size:10px}
.ready{background:#22c55e;color:black}
.sold{background:#ef4444;color:white}

/* LABEL */
.badge-right{position:absolute;top:10px;right:10px;padding:4px 8px;border-radius:999px;font-size:10px}
.hot{background:orange}
.promo{background:gold;color:black}

/* PRICE */
.price{color:#22c55e;font-weight:bold;font-size:16px}
.old{text-decoration:line-through;font-size:12px;color:#94a3b8}
.discount{background:red;padding:2px 6px;border-radius:6px;font-size:10px;margin-top:4px;display:inline-block}

/* POPUP */
.popup{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 display:none;
 background:rgba(0,0,0,0.6);
 backdrop-filter: blur(6px);
 justify-content:center;
 align-items:center;
}

.popup-box{
 background:linear-gradient(145deg,#020617,#0f172a);
 padding:20px;
 border-radius:20px;
 width:90%;
 max-width:320px;
 text-align:center;
}

.btn{
 display:block;
 margin:10px 0;
 padding:12px;
 border-radius:14px;
 text-decoration:none;
 font-weight:600;
}

.wa{background:#22c55e;color:black}
.fb{background:#3b82f6;color:white}

.close-btn{
 margin-top:8px;
 padding:8px;
 border:none;
 border-radius:10px;
 background:#1e293b;
 color:white;
 width:100%;
}

.alert-box{
 background:#020617;
 padding:20px;
 border-radius:20px;
 text-align:center;
}

.alert-box h3{color:#ef4444}

.footer{text-align:center;font-size:11px;padding:10px;color:#94a3b8}
</style>
</head>

<body>

<header>
<h1>YURAAA STORE 🎮</h1>
<p class="subtitle">Akun Game Murah • Trusted</p>
</header>

<div class="search-box">
<input id="search" placeholder="Cari akun...">
</div>

<div class="tabs">
<button onclick="filterGame('all',this)" class="tab active">Semua</button>
<button onclick="filterGame('hsr',this)" class="tab">HSR</button>
<button onclick="filterGame('solo',this)" class="tab">Solo</button>
<button onclick="filterGame('ml',this)" class="tab">ML</button>
<button onclick="filterGame('arena',this)" class="tab">Arena</button>
</div>

<div class="toolbar">
<button onclick="sortMurah()">Termurah</button>
<button onclick="sortMahal()">Termahal</button>
<button onclick="toggleSold()">Hide SOLD</button>
</div>

<div class="grid"></div>
<div class="popup" id="popup"></div>

<script>
let allData=[];
window.currentData=[];
let currentGame='all';
let hideSold=false;

document.addEventListener("DOMContentLoaded", async ()=>{
 const res=await fetch("https://opensheet.elk.sh/1myMRPoj38C1abuqPjMNtb9QABON37dRop1Rglb3uGCw/Sheet1");
 allData=await res.json();
 apply();
});

function parseHarga(h){
 return parseInt((h||'').replace(/[^0-9]/g,''))||0;
}

function apply(){
 let data=[...allData];

 if(currentGame!=='all'){
  data=data.filter(a=>(a.Game||'').toLowerCase()===currentGame);
 }

 if(hideSold){
  data=data.filter(a=>(a.Status||'').toLowerCase()!=='sold');
 }

 window.currentData=data;
 sortMurah();
}

function render(data){
 const grid=document.querySelector('.grid');
 grid.innerHTML='';

 data.sort((a,b)=>{
  const A=(a.Status||'ready').toLowerCase();
  const B=(b.Status||'ready').toLowerCase();
  if(A==='sold' && B!=='sold') return 1;
  if(A!=='sold' && B==='sold') return -1;
  return 0;
 });

 data.forEach(a=>{
  const img=(a.Gambar||'').split(',')[0].trim();
  const status=(a.Status||'ready').toLowerCase();
  const label=(a.Label||'').toLowerCase();

  const normal=parseHarga(a.Diskon);
  const harga=parseHarga(a.Harga);

  let diskon='';
  if(normal && harga && normal>harga){
    const persen=Math.round((normal-harga)/normal*100);
    diskon=`<div class="old">${a.Diskon}</div>
            <div class="discount">-${persen}%</div>`;
  }

  let labelHTML='';
  if(label==='hot') labelHTML='<div class="badge-right hot">HOT</div>';
  if(label==='promo') labelHTML='<div class="badge-right promo">PROMO</div>';

  grid.innerHTML+=`
  <div class="card ${status}" onclick='handleClick(${JSON.stringify(a)})'>
    <div class="badge ${status}">${status.toUpperCase()}</div>
    ${labelHTML}
    <img src="${img}">
    <h4>${a.Nama||'-'}</h4>
    ${diskon}
    <div class="price">${a.Harga||'-'}</div>
  </div>`;
 });
}

function handleClick(a){
 const popup=document.getElementById('popup');

 if((a.Status||'').toLowerCase()==='sold'){
  popup.innerHTML=`
  <div class="alert-box">
    <h3>❌ Akun Sudah SOLD</h3>
    <button class="close-btn" onclick="tutup()">Tutup</button>
  </div>`;
  popup.style.display='flex';
  return;
 }

 const pesan=`Halo kak, saya mau beli akun:\n${a.Nama}\nHarga: ${a.Harga}`;
 const wa=`https://wa.me/6285939286029?text=${encodeURIComponent(pesan)}`;
 const fb=`https://www.facebook.com/share/1Nk4kQ2FXJ/`;

 popup.innerHTML=`
 <div class="popup-box">
   <h3>Pilih Metode</h3>
   <a href="${wa}" class="btn wa">Direct (WA)</a>
   <a href="${fb}" class="btn fb">Middleman (FB)</a>
   <button class="close-btn" onclick="tutup()">Tutup</button>
 </div>`;
 popup.style.display='flex';
}

function tutup(){
 document.getElementById('popup').style.display='none';
}

function sortMurah(){
 render([...window.currentData].sort((a,b)=>parseHarga(a.Harga)-parseHarga(b.Harga)));
}

function sortMahal(){
 render([...window.currentData].sort((a,b)=>parseHarga(b.Harga)-parseHarga(a.Harga)));
}

function filterGame(g,el){
 currentGame=g;
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
 apply();
}

function toggleSold(){
 hideSold=!hideSold;
 apply();
}

document.getElementById('search').addEventListener('input',e=>{
 const val=e.target.value.toLowerCase();
 render(window.currentData.filter(a=>(a.Nama||'').toLowerCase().includes(val)));
});
</script>

<div class="footer">© Yuraaa Store</div>

</body>
</html>
